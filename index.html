<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLK CKC 體育管理系統 V20</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --plk-blue: #1a73e8; --plk-red: #ea4335; --plk-green: #27ae60; --plk-gold: #f39c12; --plk-dark: #34495e; }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 1300px; margin: 0 auto; padding: 10px; background-color: #f0f2f5; color: #333; }
        .card { background: white; padding: 18px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h1 { color: var(--plk-blue); text-align: center; font-size: 1.5rem; margin-bottom: 15px; }
        
        .tabs { display: flex; overflow-x: auto; gap: 5px; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 2px solid #ddd; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 10px 10px 0 0; cursor: pointer; background: #eee; font-weight: bold; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { background: var(--plk-blue); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        select, input { padding: 10px; border: 1px solid #ccc; border-radius: 8px; width: 100%; font-size: 1rem; box-sizing: border-box; }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 5px; font-size: 0.9rem; }
        .btn-blue { background: var(--plk-blue); color: white; }
        .btn-green { background: var(--plk-green); color: white; }
        .btn-red { background: var(--plk-red); color: white; }
        .btn-orange { background: var(--plk-gold); color: white; }
        .btn-dark { background: var(--plk-dark); color: white; }

        .table-wrapper { max-height: 450px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 0.9rem; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #f4f7f6; position: sticky; top: 0; z-index: 10; }

        .top5-badge { background: #fff8e1; border: 1px solid #ffe082; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .squad-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .event-slot-card { border-left: 5px solid var(--plk-blue); background: #f9f9f9; padding: 12px; border-radius: 4px; margin-bottom: 10px; }
        .slot-pill { display: inline-block; background: #fff; border: 1px dashed #aaa; padding: 6px 12px; margin: 4px; border-radius: 4px; font-size: 0.85rem; cursor: pointer; }
        .slot-filled { border-style: solid; background: #e8f0fe; color: #1967d2; border-color: var(--plk-blue); font-weight: bold; }

        @media print { .no-print { display: none !important; } #printArea { display: block !important; } table { border: 1px solid #000; } }
    </style>
</head>
<body>

<div class="no-print">
    <h1>PLK CKC 體育管理系統 V20</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('results')">📝 成績錄入</button>
        <button class="tab-btn" onclick="switchTab('analysis')">📈 排行榜分析</button>
        <button class="tab-btn" onclick="switchTab('squad')">🏃 排陣管理</button>
        <button class="tab-btn" onclick="switchTab('students')">⚙️ 學生名單管理</button>
    </div>

    <div id="results" class="tab-content active">
        <div class="card">
            <h3 id="formTitle">📍 成績數據管理</h3>
            <input type="hidden" id="editModeId" value="">
            <div class="grid">
                <input type="text" id="resCompName" placeholder="比賽/測試名稱">
                <input type="date" id="resDate">
                <select id="resYear" class="year-select" onchange="updateResNames()"></select>
                <select id="resGender" onchange="updateResNames()"><option value="M">男 (M)</option><option value="F">女 (F)</option></select>
                <select id="resName"></select>
            </div>
            <div class="grid" style="margin-top:10px;">
                <select id="resEvent"></select>
                <input type="number" id="resVal" step="0.01" placeholder="成績 (秒/米)">
                <input type="text" id="resAward" placeholder="備註">
                <button id="saveBtn" class="btn btn-blue" onclick="saveRecord()">💾 儲存</button>
                <button id="cancelBtn" class="btn btn-dark" style="display:none;" onclick="cancelEdit()">取消</button>
            </div>
        </div>
        <div class="card">
            <h3>📜 歷史紀錄</h3>
            <div class="table-wrapper"><table><thead><tr><th>日期</th><th>姓名</th><th>項目</th><th>成績</th><th>比賽</th><th>操作</th></tr></thead><tbody id="recordListArea"></tbody></table></div>
        </div>
    </div>

    <div id="analysis" class="tab-content">
        <div class="card">
            <div class="grid">
                <select id="chartYear" class="year-select" onchange="updateAnalysis()"></select>
                <select id="chartGender" onchange="updateAnalysis()"><option value="M">男</option><option value="F">女</option></select>
                <select id="chartEvent" onchange="updateAnalysis()"></select>
            </div>
            <div style="height:350px; margin-top:15px;"><canvas id="compareChart"></canvas></div>
        </div>
        <div class="card top5-badge">
            <h3 style="margin-top:0; color: var(--plk-gold);">🏆 項目歷史五強</h3>
            <table><thead><tr><th>排名</th><th>姓名</th><th>成績</th><th>比賽</th><th>日期</th></tr></thead><tbody id="top5Area"></tbody></table>
            <p id="top5Empty" style="text-align:center; color:#999; display:none;">暫無相關數據</p>
        </div>
    </div>

    <div id="squad" class="tab-content">
        <div class="card">
            <div class="grid">
                <select id="sqComp" onchange="renderSquadBoard()"><option value="plk">保良局賽</option><option value="shatin">學界沙田賽</option><option value="five">五校聯賽</option></select>
                <select id="sqGrade" onchange="renderSquadBoard()"><option value="A">男甲</option><option value="FA">女甲</option><option value="B">男乙</option><option value="FB">女乙</option><option value="C">男丙</option><option value="FC">女丙</option></select>
                <button class="btn btn-dark" onclick="window.print()">🖨️ 列印名單</button>
            </div>
        </div>
        <div id="squadBoard" class="squad-container"></div>
    </div>

    <div id="students" class="tab-content">
        <div class="card">
            <h3>👥 新增/廢除運動員</h3>
            <div class="grid">
                <input type="text" id="newStuName" placeholder="姓名">
                <select id="newStuYear" class="year-select"></select>
                <select id="newStuGender"><option value="M">男 (M)</option><option value="F">女 (F)</option></select>
                <button class="btn btn-green" onclick="addNewStudent()">➕ 加入</button>
            </div>
            <div class="table-wrapper"><table><thead><tr><th>姓名</th><th>年份</th><th>性別</th><th>操作</th></tr></thead><tbody id="stuListArea"></tbody></table></div>
        </div>
        <div class="card">
            <h3>📊 Excel 數據中心</h3>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn btn-blue" onclick="exportToExcel()">📤 匯出 Excel</button>
                <button class="btn btn-dark" onclick="document.getElementById('importFile').click()">📥 匯入 Excel</button>
                <input type="file" id="importFile" style="display:none" accept=".xlsx" onchange="importFromExcel(event)">
                <button class="btn btn-red" onclick="resetSystem()">⚠️ 重置</button>
            </div>
        </div>
    </div>
</div>

<div id="pickerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
    <div class="card" style="width:90%; max-width:400px;"><h4>選擇運動員</h4><div id="pickerList" style="max-height:300px; overflow-y:auto;"></div><button class="btn btn-blue" onclick="closePicker()" style="background:#666; width:100%; margin-top:10px;">關閉</button></div>
</div>

<script>
// --- 全量運動員名單 (102位) ---
const CORE_STUDENTS = [
    // 2015 M
    {n:"朱政熙",y:2015,g:"M"},{n:"陳浩霆",y:2015,g:"M"},{n:"黃樂童",y:2015,g:"M"},{n:"林俊宇",y:2015,g:"M"},{n:"鄭悅朗",y:2015,g:"M"},{n:"梁匡茗",y:2015,g:"M"},{n:"劉凱諾",y:2015,g:"M"},{n:"陳楷洋",y:2015,g:"M"},{n:"鍾政言",y:2015,g:"M"},{n:"李泓正",y:2015,g:"M"},{n:"張焯珽",y:2015,g:"M"},{n:"黃日希",y:2015,g:"M"},
    // 2015 F
    {n:"黃子晴",y:2015,g:"F"},{n:"羅文君",y:2015,g:"F"},{n:"譚念珈",y:2015,g:"F"},{n:"許芯語",y:2015,g:"F"},{n:"施驊倩",y:2015,g:"F"},{n:"黃鈺瞳",y:2015,g:"F"},{n:"曾釨渘",y:2015,g:"F"},{n:"王恩烯",y:2015,g:"F"},{n:"彭乙晴",y:2015,g:"F"},{n:"顏卡蜜拉",y:2015,g:"F"},
    // 2016 M
    {n:"沈卓諾",y:2016,g:"M"},{n:"邱梓傑",y:2016,g:"M"},{n:"劉緻彥",y:2016,g:"M"},{n:"李宇澤",y:2016,g:"M"},{n:"黃柏禧",y:2016,g:"M"},{n:"陳灝軒",y:2016,g:"M"},{n:"黃梓澧",y:2016,g:"M"},{n:"岳青辰",y:2016,g:"M"},{n:"周駿熹",y:2016,g:"M"},{n:"劉君浩",y:2016,g:"M"},{n:"梁宇翹",y:2016,g:"M"},{n:"黃梓浩",y:2016,g:"M"},
    // 2016 F
    {n:"朱兆然",y:2016,g:"F"},{n:"張穎忻",y:2016,g:"F"},{n:"陳曉澄",y:2016,g:"F"},{n:"伍熹榆",y:2016,g:"F"},{n:"黃藝之",y:2016,g:"F"},{n:"高梓翹",y:2016,g:"F"},{n:"薛雨菲",y:2016,g:"F"},{n:"葉希嵐",y:2016,g:"F"},{n:"張懷瑾",y:2016,g:"F"},{n:"張懷蔚",y:2016,g:"F"},{n:"楊倬欣",y:2016,g:"F"},{n:"陳詩晴",y:2016,g:"F"},{n:"丘倩柔",y:2016,g:"F"},
    // 2017 M
    {n:"羅啟鋒",y:2017,g:"M"},{n:"梁匡毅",y:2017,g:"M"},{n:"郭俊希",y:2017,g:"M"},{n:"盧鍵霆",y:2017,g:"M"},{n:"江柏昊",y:2017,g:"M"},{n:"鄧萃藍",y:2017,g:"M"},{n:"黃星澧",y:2017,g:"M"},{n:"彭子恪",y:2017,g:"M"},{n:"余卓謙",y:2017,g:"M"},{n:"劉栢熹",y:2017,g:"M"},{n:"胡梓賢",y:2017,g:"M"},{n:"麥風",y:2017,g:"M"},{n:"楊少琪",y:2017,g:"M"},{n:"徐梓程",y:2017,g:"M"},{n:"余焌達",y:2017,g:"M"},
    // 2017 F
    {n:"陳諾彤",y:2017,g:"F"},{n:"李思穎",y:2017,g:"F"},{n:"袁煜婷",y:2017,g:"F"},{n:"陳浠庭",y:2017,g:"F"},{n:"曾涴嘉",y:2017,g:"F"},{n:"陳迦琳",y:2017,g:"F"},{n:"焦梓涵",y:2017,g:"F"},{n:"鄧芓游",y:2017,g:"F"},{n:"蔡蔚言",y:2017,g:"F"},{n:"方一心",y:2017,g:"F"},{n:"儲思佳",y:2017,g:"F"},{n:"徐梓瑤",y:2017,g:"F"},{n:"陳希妍",y:2017,g:"F"},
    // 2018 M
    {n:"謝瀚陞",y:2018,g:"M"},{n:"胡仲希",y:2018,g:"M"},{n:"黃語浚",y:2018,g:"M"},{n:"梁喬珀",y:2018,g:"M"},{n:"鄔嘉樂",y:2018,g:"M"},{n:"林建宇",y:2018,g:"M"},{n:"李泓亮",y:2018,g:"M"},{n:"廖柏希",y:2018,g:"M"},{n:"伍梓灝",y:2018,g:"M"},{n:"陳境逸",y:2018,g:"M"},{n:"李天仁",y:2018,g:"M"},{n:"黃洛鋋",y:2018,g:"M"},{n:"杜濼麒",y:2018,g:"M"},{n:"李宇軒",y:2018,g:"M"},
    // 2018 F
    {n:"周暟淳",y:2018,g:"F"},{n:"陳希兒",y:2018,g:"F"},{n:"鄧善殷",y:2018,g:"F"},{n:"李晉兒",y:2018,g:"F"},{n:"鄧雅殷",y:2018,g:"F"},{n:"雪壬愷",y:2018,g:"F"},{n:"邱曼露",y:2018,g:"F"},{n:"李心妤",y:2018,g:"F"},{n:"李梓雯",y:2018,g:"F"},{n:"張善愉",y:2018,g:"F"},{n:"麥稀澄",y:2018,g:"F"},{n:"童文涵",y:2018,g:"F"},{n:"林靖柔",y:2018,g:"F"}
];

let students = JSON.parse(localStorage.getItem('ckc_stu_v2')) || CORE_STUDENTS;
let records = JSON.parse(localStorage.getItem('ckc_rec_v2')) || [];
let squads = JSON.parse(localStorage.getItem('ckc_sq_v2')) || {};
const events = ["60m", "100m", "200m", "400m", "跳遠", "跳高", "擲壘球", "推鉛球", "4x100m"];
let chartInstance = null;

window.onload = () => {
    initYearSelects();
    document.getElementById('resDate').valueAsDate = new Date();
    ['resEvent', 'chartEvent'].forEach(id => {
        const el = document.getElementById(id);
        events.forEach(e => el.add(new Option(e, e)));
    });
    refreshAll();
};

function initYearSelects() {
    const selects = document.querySelectorAll('.year-select');
    selects.forEach(sel => {
        sel.innerHTML = "";
        for(let y=2014; y<=2025; y++) {
            sel.add(new Option(y + " 年", y));
        }
    });
    document.getElementById('resYear').value = 2015;
    document.getElementById('chartYear').value = 2015;
    document.getElementById('newStuYear').value = 2018;
}

function refreshAll() {
    updateResNames(); renderRecords(); renderStudentAdmin(); renderSquadBoard();
}

function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
    if(id === 'analysis') setTimeout(updateAnalysis, 100);
}

// --- 學生管理 ---
function addNewStudent() {
    const n = document.getElementById('newStuName').value.trim();
    const y = parseInt(document.getElementById('newStuYear').value);
    const g = document.getElementById('newStuGender').value;
    if(!n) return alert("姓名不能為空");
    students.push({n, y, g});
    saveAll(); renderStudentAdmin(); updateResNames();
    document.getElementById('newStuName').value = "";
}

function deleteStudent(n, y) {
    if(confirm(`廢除「${n} (${y})」嗎？`)) {
        students = students.filter(s => !(s.n===n && s.y===y));
        saveAll(); renderStudentAdmin(); updateResNames();
    }
}

function renderStudentAdmin() {
    const area = document.getElementById('stuListArea');
    area.innerHTML = students.sort((a,b)=>b.y-a.y || a.n.localeCompare(b.n)).map(s => `
        <tr><td><strong>${s.n}</strong></td><td>${s.y}</td><td>${s.g==='M'?'男':'女'}</td>
        <td><button class="btn btn-red" style="padding:4px 8px;" onclick="deleteStudent('${s.n}', ${s.y})">廢除</button></td></tr>
    `).join('');
}

// --- 成績管理 ---
function saveRecord() {
    const id = document.getElementById('editModeId').value;
    const name = document.getElementById('resName').value;
    const val = parseFloat(document.getElementById('resVal').value);
    if(!name || isNaN(val)) return alert("請輸入完整成績");

    const data = {
        id: id ? parseFloat(id) : Date.now(),
        comp: document.getElementById('resCompName').value || "日常測試",
        date: document.getElementById('resDate').value,
        name,
        year: parseInt(document.getElementById('resYear').value),
        gender: document.getElementById('resGender').value,
        event: document.getElementById('resEvent').value,
        val,
        award: document.getElementById('resAward').value
    };

    if(id) {
        records[records.findIndex(r => r.id == id)] = data;
        cancelEdit();
    } else {
        records.unshift(data);
    }
    saveAll(); renderRecords(); alert("儲存成功");
}

function renderRecords() {
    document.getElementById('recordListArea').innerHTML = records.map(r => `
        <tr><td>${r.date}</td><td><strong>${r.name}</strong></td><td>${r.event}</td><td>${r.val}</td><td>${r.comp}</td>
        <td><button class="btn btn-blue" style="padding:4px 8px;" onclick="editRecord(${r.id})">編輯</button>
        <button class="btn btn-red" style="padding:4px 8px;" onclick="deleteRecord(${r.id})">刪除</button></td></tr>
    `).join('');
}

function editRecord(id) {
    const r = records.find(rec => rec.id == id);
    document.getElementById('formTitle').innerText = "✏️ 編輯成績";
    document.getElementById('editModeId').value = r.id;
    document.getElementById('resCompName').value = r.comp;
    document.getElementById('resDate').value = r.date;
    document.getElementById('resYear').value = r.year;
    document.getElementById('resGender').value = r.gender;
    updateResNames();
    document.getElementById('resName').value = r.name;
    document.getElementById('resEvent').value = r.event;
    document.getElementById('resVal').value = r.val;
    document.getElementById('resAward').value = r.award;
    document.getElementById('saveBtn').innerText = "✅ 更新";
    document.getElementById('saveBtn').className = "btn btn-orange";
    document.getElementById('cancelBtn').style.display = "inline-flex";
}

function cancelEdit() {
    document.getElementById('formTitle').innerText = "📍 成績數據管理";
    document.getElementById('editModeId').value = "";
    document.getElementById('saveBtn').innerText = "💾 儲存";
    document.getElementById('saveBtn').className = "btn btn-blue";
    document.getElementById('cancelBtn').style.display = "none";
    document.getElementById('resVal').value = "";
}

function deleteRecord(id) { if(confirm("確定刪除？")) { records = records.filter(r => r.id != id); saveAll(); renderRecords(); } }

function updateResNames() {
    const yr = parseInt(document.getElementById('resYear').value), g = document.getElementById('resGender').value;
    const sel = document.getElementById('resName'); sel.innerHTML = "";
    students.filter(s => s.y == yr && s.g == g).sort((a,b)=>a.n.localeCompare(b.n)).forEach(s => sel.add(new Option(s.n, s.n)));
}

function saveAll() {
    localStorage.setItem('ckc_stu_v2', JSON.stringify(students));
    localStorage.setItem('ckc_rec_v2', JSON.stringify(records));
    localStorage.setItem('ckc_sq_v2', JSON.stringify(squads));
}

// --- 分析 & 排行榜 ---
function updateAnalysis() {
    const yr = parseInt(document.getElementById('chartYear').value), g = document.getElementById('chartGender').value, ev = document.getElementById('chartEvent').value;
    const isField = ["跳遠", "跳高", "擲壘球", "推鉛球"].includes(ev);
    const bests = {};
    records.filter(r => r.year == yr && r.gender == g && r.event == ev).forEach(r => {
        if(!bests[r.name] || (isField ? r.val > bests[r.name].val : r.val < bests[r.name].val)) bests[r.name] = r;
    });
    const top5 = Object.values(bests).sort((a,b) => isField ? b.val - a.val : a.val - b.val).slice(0,5);
    const area = document.getElementById('top5Area'); area.innerHTML = "";
    document.getElementById('top5Empty').style.display = top5.length ? "none" : "block";
    top5.forEach((r, idx) => { area.innerHTML += `<tr><td>第 ${idx+1} 名</td><td><strong>${r.name}</strong></td><td>${r.val}</td><td>${r.comp}</td><td>${r.date}</td></tr>`; });
    
    const filtered = records.filter(r => r.year == yr && r.gender == g && r.event == ev).sort((a,b) => new Date(a.date) - new Date(b.date));
    const studentData = {}; filtered.forEach(r => { if(!studentData[r.name]) studentData[r.name] = []; studentData[r.name].push({ x: r.date, y: r.val }); });
    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(document.getElementById('compareChart').getContext('2d'), { type: 'line', data: { datasets: Object.keys(studentData).map((n, i) => ({ label: n, data: studentData[n], borderColor: `hsl(${(i*70)%360},70%,50%)`, fill: false })) }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { reverse: !isField } } } });
}

// --- Excel ---
function exportToExcel() {
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(students), "Students");
    XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(records), "Records");
    XLSX.writeFile(wb, `PLK_CKC_V20_Backup.xlsx`);
}

function importFromExcel(event) {
    const reader = new FileReader();
    reader.onload = (e) => {
        const wb = XLSX.read(new Uint8Array(e.target.result), { type: 'array' });
        if(confirm("將覆蓋現有數據，確定嗎？")) {
            if(wb.Sheets["Students"]) students = XLSX.utils.sheet_to_json(wb.Sheets["Students"]);
            if(wb.Sheets["Records"]) records = XLSX.utils.sheet_to_json(wb.Sheets["Records"]);
            saveAll(); location.reload();
        }
    };
    reader.readAsArrayBuffer(event.target.files[0]);
}

// --- 排陣 (基礎邏輯) ---
function renderSquadBoard() {

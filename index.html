<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLK CKC 體育管理系統 V23</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --plk-blue: #1a73e8; --plk-red: #ea4335; --plk-green: #27ae60; --plk-gold: #f39c12; --plk-dark: #34495e; }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 1300px; margin: 0 auto; padding: 10px; background-color: #f0f2f5; color: #333; }
        .card { background: white; padding: 18px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h1 { color: var(--plk-blue); text-align: center; font-size: 1.2rem; margin-bottom: 10px; }
        
        .tabs { display: flex; overflow-x: auto; gap: 5px; margin-bottom: 15px; border-bottom: 2px solid #ddd; }
        .tab-btn { padding: 10px 15px; border: none; border-radius: 8px 8px 0 0; cursor: pointer; background: #eee; font-weight: bold; white-space: nowrap; font-size: 0.9rem; }
        .tab-btn.active { background: var(--plk-blue); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
        select, input { padding: 10px; border: 1px solid #ccc; border-radius: 8px; width: 100%; font-size: 1rem; box-sizing: border-box; }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .btn-blue { background: var(--plk-blue); color: white; }
        .btn-green { background: var(--plk-green); color: white; }
        .btn-red { background: var(--plk-red); color: white; }

        /* 排陣卡片 */
        .squad-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px; }
        .event-slot-card { border-left: 5px solid var(--plk-blue); background: #f9f9f9; padding: 12px; border-radius: 8px; }
        .slot-title { font-weight: bold; color: var(--plk-dark); display: block; margin-bottom: 5px;}
        .slot-pill { display: inline-block; background: #fff; border: 1px dashed #aaa; padding: 8px 12px; margin: 4px; border-radius: 6px; font-size: 0.9rem; cursor: pointer; min-width: 60px; text-align: center; }
        .slot-filled { border-style: solid; background: #e8f0fe; color: #1967d2; border-color: var(--plk-blue); font-weight: bold; }

        /* 彈窗 */
        #pickerModal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:2000; justify-content:center; align-items:center; }
        .picker-content { background:white; width:95%; max-width:500px; padding:20px; border-radius:15px; max-height:90vh; display:flex; flex-direction:column; }
        .picker-list { overflow-y:auto; flex-grow:1; margin:15px 0; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .stu-item { padding: 12px; border: 1px solid #ddd; border-radius: 8px; text-align: left; background: #fff; cursor: pointer;}
        .stu-tag { font-size: 0.7rem; background: #eee; padding: 2px 5px; border-radius: 4px; color: #666; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="no-print">
    <h1>PLK CKC 體育管理 V23 (智慧組別版)</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('squad')">🏃 排陣管理</button>
        <button class="tab-btn" onclick="switchTab('results')">📝 成績錄入</button>
        <button class="tab-btn" onclick="switchTab('students')">👥 名單管理</button>
    </div>

    <div id="squad" class="tab-content active">
        <div class="card">
            <div class="grid">
                <select id="sqComp" onchange="renderSquadBoard()">
                    <option value="plk">（保良局）全港屬下小學賽</option>
                    <option value="shatin">（學界）沙田小學校際賽</option>
                    <option value="five">（五校）沙田區屬下小學賽</option>
                </select>
                <select id="sqGrade" onchange="renderSquadBoard()">
                    <option value="A">男甲</option><option value="FA">女甲</option>
                    <option value="B">男乙</option><option value="FB">女乙</option>
                    <option value="C">男丙</option><option value="FC">女丙</option>
                    <option value="D">男丁</option><option value="FD">女丁</option>
                </select>
            </div>
            <p id="gradeNote" style="font-size: 0.8rem; color: #666; margin-top: 5px;"></p>
            <div id="squadBoard" class="squad-container" style="margin-top:15px;"></div>
        </div>
    </div>

    <div id="results" class="tab-content">
        <div class="card">
            <h3 id="formTitle" style="margin-top:0">📍 錄入成績</h3>
            <div class="grid">
                <select id="resYear" class="year-select" onchange="updateResNames()"></select>
                <select id="resGender" onchange="updateResNames()"><option value="M">男</option><option value="F">女</option></select>
                <select id="resName"></select>
                <select id="resEvent"></select>
                <input type="number" id="resVal" step="0.01" placeholder="成績">
                <button class="btn btn-blue" onclick="saveRecord()">儲存</button>
            </div>
        </div>
        <div class="card">
            <div class="table-wrapper" style="overflow-x:auto">
                <table style="width:100%; border-collapse: collapse;">
                    <thead><tr style="background:#eee"><th>姓名</th><th>項目</th><th>成績</th><th>操作</th></tr></thead>
                    <tbody id="recordListArea"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="students" class="tab-content">
        <div class="card">
            <h3>👥 隊員列表</h3>
            <div class="grid">
                <input type="text" id="newStuName" placeholder="姓名">
                <select id="newStuYear" class="year-select"></select>
                <select id="newStuGender"><option value="M">男</option><option value="F">女</option></select>
                <button class="btn btn-green" onclick="addNewStudent()">加入</button>
            </div>
            <div style="margin-top:15px; display:flex; gap:10px;">
                <button class="btn btn-blue" onclick="exportToExcel()">匯出 Excel</button>
                <button class="btn btn-red" onclick="resetSystem()">清空重置</button>
            </div>
        </div>
    </div>
</div>

<div id="pickerModal">
    <div class="picker-content">
        <h3 id="pickerTitle" style="margin:0">選擇運動員</h3>
        <p style="font-size:0.8rem; color:var(--plk-red);">* 僅顯示符合性別及越級規則的學生</p>
        <input type="text" id="pickerSearch" placeholder="🔍 搜尋姓名..." oninput="filterPickerList()" style="margin:10px 0;">
        <div id="pickerList" class="picker-list"></div>
        <div style="display:flex; gap:10px;">
            <button class="btn btn-red" style="flex:1" onclick="selectAthlete('')">❌ 清除位置</button>
            <button class="btn btn-blue" style="flex:1" onclick="closePicker()">關閉</button>
        </div>
    </div>
</div>

<script>
// --- 核心配置 ---
const SQUAD_QUOTAS = {
    plk: {
        A: {"60m":2,"100m":2,"200m":2,"400m":1,"跳遠":1,"跳高":1,"擲壘球":1,"推鉛球":1,"4x100m":6},
        B: {"60m":2,"100m":2,"200m":2,"跳遠":1,"擲壘球":1,"4x100m":6},
        C: {"60m":2,"100m":2,"跳遠":1,"4x100m":6}
    },
    shatin: {
        A: {"60m":2,"100m":2,"200m":2,"400m":1,"跳遠":1,"跳高":1,"擲壘球":1,"推鉛球":1,"4x100m":6},
        B: {"60m":2,"100m":2,"200m":2,"跳遠":1,"跳高":1,"擲壘球":1,"4x100m":6},
        C: {"60m":2,"100m":2,"跳遠":1,"4x100m":6}
    },
    five: {
        A: {"100m":4,"200m":4,"跳遠":2,"推鉛球":2,"4x100m":6},
        B: {"100m":4,"200m":4,"跳遠":2,"推鉛球":2,"4x100m":6},
        C: {"60m":4,"100m":4,"跳遠":2,"擲壘球":2,"4x100m":6},
        D: {"60m":4,"100m":4,"跳遠":2,"擲壘球":2,"4x100m":6}
    }
};

const CORE_STUDENTS = [
    {n:"朱政熙",y:2015,g:"M"},{n:"陳浩霆",y:2015,g:"M"},{n:"黃樂童",y:2015,g:"M"},{n:"林俊宇",y:2015,g:"M"},{n:"鄭悅朗",y:2015,g:"M"},{n:"梁匡茗",y:2015,g:"M"},{n:"劉凱諾",y:2015,g:"M"},{n:"陳楷洋",y:2015,g:"M"},{n:"鍾政言",y:2015,g:"M"},{n:"李泓正",y:2015,g:"M"},{n:"張焯珽",y:2015,g:"M"},{n:"黃日希",y:2015,g:"M"},
    {n:"黃子晴",y:2015,g:"F"},{n:"羅文君",y:2015,g:"F"},{n:"譚念珈",y:2015,g:"F"},{n:"許芯語",y:2015,g:"F"},{n:"施驊倩",y:2015,g:"F"},{n:"黃鈺瞳",y:2015,g:"F"},{n:"曾釨渘",y:2015,g:"F"},{n:"王恩烯",y:2015,g:"F"},{n:"彭乙晴",y:2015,g:"F"},{n:"顏卡蜜拉",y:2015,g:"F"},
    {n:"沈卓諾",y:2016,g:"M"},{n:"邱梓傑",y:2016,g:"M"},{n:"劉緻彥",y:2016,g:"M"},{n:"李宇澤",y:2016,g:"M"},{n:"黃柏禧",y:2016,g:"M"},{n:"陳灝軒",y:2016,g:"M"},{n:"黃梓澧",y:2016,g:"M"},{n:"岳青辰",y:2016,g:"M"},{n:"周駿熹",y:2016,g:"M"},{n:"劉君浩",y:2016,g:"M"},{n:"梁宇翹",y:2016,g:"M"},{n:"黃梓浩",y:2016,g:"M"},
    {n:"朱兆然",y:2016,g:"F"},{n:"張穎忻",y:2016,g:"F"},{n:"陳曉澄",y:2016,g:"F"},{n:"伍熹榆",y:2016,g:"F"},{n:"黃藝之",y:2016,g:"F"},{n:"高梓翹",y:2016,g:"F"},{n:"薛雨菲",y:2016,g:"F"},{n:"葉希嵐",y:2016,g:"F"},{n:"張懷瑾",y:2016,g:"F"},{n:"張懷蔚",y:2016,g:"F"},{n:"楊倬欣",y:2016,g:"F"},{n:"陳詩晴",y:2016,g:"F"},{n:"丘倩柔",y:2016,g:"F"},
    {n:"羅啟鋒",y:2017,g:"M"},{n:"梁匡毅",y:2017,g:"M"},{n:"郭俊希",y:2017,g:"M"},{n:"盧鍵霆",y:2017,g:"M"},{n:"江柏昊",y:2017,g:"M"},{n:"鄧萃藍",y:2017,g:"M"},{n:"黃星澧",y:2017,g:"M"},{n:"彭子恪",y:2017,g:"M"},{n:"余卓謙",y:2017,g:"M"},{n:"劉栢熹",y:2017,g:"M"},{n:"胡梓賢",y:2017,g:"M"},{n:"麥風",y:2017,g:"M"},{n:"楊少琪",y:2017,g:"M"},{n:"徐梓程",y:2017,g:"M"},{n:"余焌達",y:2017,g:"M"},
    {n:"陳諾彤",y:2017,g:"F"},{n:"李思穎",y:2017,g:"F"},{n:"袁煜婷",y:2017,g:"F"},{n:"陳浠庭",y:2017,g:"F"},{n:"曾涴嘉",y:2017,g:"F"},{n:"陳迦琳",y:2017,g:"F"},{n:"焦梓涵",y:2017,g:"F"},{n:"鄧芓游",y:2017,g:"F"},{n:"蔡蔚言",y:2017,g:"F"},{n:"方一心",y:2017,g:"F"},{n:"儲思佳",y:2017,g:"F"},{n:"徐梓瑤",y:2017,g:"F"},{n:"陳希妍",y:2017,g:"F"},
    {n:"謝瀚陞",y:2018,g:"M"},{n:"胡仲希",y:2018,g:"M"},{n:"黃語浚",y:2018,g:"M"},{n:"梁喬珀",y:2018,g:"M"},{n:"鄔嘉樂",y:2018,g:"M"},{n:"林建宇",y:2018,g:"M"},{n:"李泓亮",y:2018,g:"M"},{n:"廖柏希",y:2018,g:"M"},{n:"伍梓灝",y:2018,g:"M"},{n:"陳境逸",y:2018,g:"M"},{n:"李天仁",y:2018,g:"M"},{n:"黃洛鋋",y:2018,g:"M"},{n:"杜濼麒",y:2018,g:"M"},{n:"李宇軒",y:2018,g:"M"},
    {n:"周暟淳",y:2018,g:"F"},{n:"陳希兒",y:2018,g:"F"},{n:"鄧善殷",y:2018,g:"F"},{n:"李晉兒",y:2018,g:"F"},{n:"鄧雅殷",y:2018,g:"F"},{n:"雪壬愷",y:2018,g:"F"},{n:"邱曼露",y:2018,g:"F"},{n:"李心妤",y:2018,g:"F"},{n:"李梓雯",y:2018,g:"F"},{n:"張善愉",y:2018,g:"F"},{n:"麥稀澄",y:2018,g:"F"},{n:"童文涵",y:2018,g:"F"},{n:"林靖柔",y:2018,g:"F"}
];

let students = JSON.parse(localStorage.getItem('ckc_stu_v23')) || CORE_STUDENTS;
let records = JSON.parse(localStorage.getItem('ckc_rec_v23')) || [];
let squads = JSON.parse(localStorage.getItem('ckc_sq_v23')) || {};
const events = ["60m", "100m", "200m", "400m", "跳遠", "跳高", "擲壘球", "推鉛球", "4x100m"];
let activeSlot = null;

// --- 智慧組別計算邏輯 ---
function getStudentGrade(birthYear) {
    const currentYear = new Date().getFullYear();
    const diff = currentYear - birthYear;
    // 2026年為例: 2015年生(11歲)=甲, 2016(10歲)=乙, 2017(9歲)=丙, 2018+(8歲或以下)=丁
    if (diff >= 11) return 'A';
    if (diff === 10) return 'B';
    if (diff === 9) return 'C';
    return 'D';
}

function canCompete(studentYear, targetGrade) {
    const sGrade = getStudentGrade(studentYear);
    const gradeOrder = { 'D': 1, 'C': 2, 'B': 3, 'A': 4 };
    // 丁組(1)可以參加 A,B,C,D (4,3,2,1)
    // 丙組(2)可以參加 A,B,C (4,3,2)
    // 乙組(3)可以參加 A,B (4,3)
    // 甲組(4)只能參加 A (4)
    return gradeOrder[targetGrade] >= gradeOrder[sGrade];
}

// --- 初始化 ---
window.onload = () => {
    document.querySelectorAll('.year-select').forEach(sel => {
        for(let y=2014; y<=2025; y++) sel.add(new Option(y+" 年", y));
    });
    document.getElementById('resYear').value = 2015;
    events.forEach(e => document.getElementById('resEvent').add(new Option(e, e)));
    renderSquadBoard();
    renderRecords();
};

// --- 排陣管理 ---
function renderSquadBoard() {
    const comp = document.getElementById('sqComp').value, gKey = document.getElementById('sqGrade').value;
    const gender = gKey.startsWith('F') ? 'F' : 'M', grade = gKey.replace('F', '');
    const board = document.getElementById('squadBoard'); board.innerHTML = "";
    
    // 更新提示
    const currentYear = new Date().getFullYear();
    const birthMap = { 'A': currentYear-11, 'B': currentYear-10, 'C': currentYear-9, 'D': `${currentYear-8}或之後` };
    document.getElementById('gradeNote').innerText = `目前年度：${currentYear} | 正線生出生年份：${birthMap[grade]}`;

    let qSet = JSON.parse(JSON.stringify(SQUAD_QUOTAS[comp][grade] || {}));
    
    // 五校女乙/甲 特殊修正 (根據老師名單)
    if(comp === 'five' && gender === 'F' && grade === 'B') {
        if(qSet["推鉛球"]) { qSet["擲壘球"] = qSet["推鉛球"]; delete qSet["推鉛球"]; }
    }

    if(Object.keys(qSet).length === 0) {
        board.innerHTML = "<p style='text-align:center; color:#999;'>此比賽無此組別。</p>";
        return;
    }

    Object.keys(qSet).forEach(ev => {
        const count = qSet[ev], key = `${comp}_${gKey}_${ev}`;
        const names = squads[key] || [];
        let pills = "";
        for(let i=0; i<count; i++) {
            const n = names[i] || "待選擇";
            pills += `<div class="slot-pill ${n!=='待選擇'?'slot-filled':''}" onclick="openPicker('${key}', ${i}, '${gender}', '${grade}')">${n}</div>`;
        }
        board.innerHTML += `<div class="event-slot-card"><span class="slot-title">${ev} (${count}名)</span>${pills}</div>`;
    });
}

function openPicker(key, index, gender, targetGrade) {
    activeSlot = { key, index, gender, targetGrade };
    document.getElementById('pickerModal').style.display = "flex";
    filterPickerList();
}

function filterPickerList() {
    const term = document.getElementById('pickerSearch').value.toLowerCase();
    const list = document.getElementById('pickerList'); list.innerHTML = "";
    
    students.filter(s => {
        const matchGender = s.g === activeSlot.gender;
        const matchSearch = s.n.toLowerCase().includes(term);
        const matchRule = canCompete(s.y, activeSlot.targetGrade);
        return matchGender && matchSearch && matchRule;
    }).forEach(s => {
        const div = document.createElement('div');
        div.className = "stu-item";
        const sGrade = getStudentGrade(s.y);
        div.innerHTML = `<strong>${s.n}</strong> <span class="stu-tag">${s.y} (${sGrade}組生)</span>`;
        div.onclick = () => selectAthlete(s.n);
        list.appendChild(div);
    });
}

function selectAthlete(name) {
    const { key, index } = activeSlot;
    if(!squads[key]) squads[key] = [];
    squads[key][index] = name || null;
    saveAll(); renderSquadBoard(); closePicker();
}

function closePicker() { document.getElementById('pickerModal').style.display = "none"; }

// --- 其他功能 ---
function saveAll() {
    localStorage.setItem('ckc_stu_v23', JSON.stringify(students));
    localStorage.setItem('ckc_rec_v23', JSON.stringify(records));
    localStorage.setItem('ckc_sq_v23', JSON.stringify(squads));
}
function saveRecord() {
    const n = document.getElementById('resName').value, v = document.getElementById('resVal').value;
    if(!n || !v) return alert("資料不全");
    records.unshift({ id:Date.now(), name:n, event:document.getElementById('resEvent').value, val:v, date:new Date().toLocaleDateString() });
    saveAll(); renderRecords();
}
function renderRecords() {
    document.getElementById('recordListArea').innerHTML = records.slice(0,10).map(r=>`<tr><td>${r.name}</td><td>${r.event}</td><td>${r.val}</td><td><button onclick="delRec(${r.id})">刪</button></td></tr>`).join('');
}
function delRec(id) { records = records.filter(r=>r.id!==id); saveAll(); renderRecords(); }
function updateResNames() {
    const y = parseInt(document.getElementById('resYear').value), g = document.getElementById('resGender').value;
    const sel = document.getElementById('resName'); sel.innerHTML = "";
    students.filter(s=>s.y==y && s.g==g).forEach(s=>sel.add(new Option(s.n, s.n)));
}
function addNewStudent() {
    const n = document.getElementById('newStuName').value;
    if(!n) return;
    students.push({n, y:parseInt(document.getElementById('newStuYear').value), g:document.getElementById('newStuGender').value});
    saveAll(); alert("已加入");
}
function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}
function resetSystem() { if(confirm("確定清空所有排陣與成績？")) { localStorage.clear(); location.reload(); } }
function exportToExcel() { const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(records), "Records"); XLSX.writeFile(wb, "CKC_Backup.xlsx"); }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLK CKC - 體育管理系統 V6</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --plk-blue: #1a73e8; --plk-red: #ea4335; --plk-green: #27ae60; }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 1000px; margin: 0 auto; padding: 15px; background-color: #f4f7f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h1 { color: var(--plk-blue); text-align: center; }
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; gap: 8px; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 30px; cursor: pointer; background: #e0e0e0; font-weight: bold; }
        .tab-btn.active { background: var(--plk-blue); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .input-group { margin-bottom: 15px; }
        .input-label { font-size: 0.85rem; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        select, input { padding: 10px; border: 1px solid #ced4da; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 1rem; }
        .btn { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin-top: 10px; }
        .btn-blue { background: var(--plk-blue); color: white; }
        .btn-green { background: var(--plk-green); color: white; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }
        @media print { .no-print { display: none !important; } #printArea { display: block !important; } }
    </style>
</head>
<body>

<div class="no-print">
    <h1>PLK CKC 體育管理系統</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('results')">📊 成績錄入</button>
        <button class="tab-btn" onclick="switchTab('squad')">🏃 出賽排陣</button>
        <button class="tab-btn" onclick="switchTab('students')">👥 學生管理</button>
    </div>

    <div id="results" class="tab-content active">
        <div class="card">
            <h3>📍 錄入成績</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;">
                <div class="input-group">
                    <label class="input-label">1. 出生年份</label>
                    <select id="resYear" onchange="updateResNames()"></select>
                </div>
                <div class="input-group">
                    <label class="input-label">2. 性別</label>
                    <select id="resGender" onchange="updateResNames()">
                        <option value="M">男</option>
                        <option value="F">女</option>
                    </select>
                </div>
                <div class="input-group">
                    <label class="input-label">3. 學生姓名</label>
                    <select id="resName"></select>
                </div>
                <div class="input-group">
                    <label class="input-label">4. 比賽項目</label>
                    <select id="resEvent"></select>
                </div>
                <div class="input-group">
                    <label class="input-label">5. 成績 (秒/米)</label>
                    <input type="number" id="resVal" step="0.01" placeholder="輸入數值">
                </div>
            </div>
            <button class="btn btn-blue" onclick="addRecord()">保存紀錄</button>
        </div>
    </div>

    <div id="squad" class="tab-content">
        <div class="card">
            <div style="display: flex; gap: 10px; margin-bottom: 20px;">
                <select id="sqComp" onchange="renderSquad()">
                    <option value="plk">保良局屬下小學比賽</option>
                    <option value="shatin">沙田區學界比賽</option>
                    <option value="five">沙田區五校比賽</option>
                </select>
                <select id="sqGrade" onchange="renderSquad()">
                    <option value="A">男甲</option><option value="FA">女甲</option>
                    <option value="B">男乙</option><option value="FB">女乙</option>
                    <option value="C">男丙</option><option value="FC">女丙</option>
                    <option value="D">男丁</option><option value="FD">女丁</option>
                </select>
            </div>
            <button class="btn btn-blue" onclick="autoRecommend()" style="margin-bottom:10px;">🤖 AI 智能排陣</button>
            <div id="squadArea" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 15px;"></div>
        </div>
    </div>

    <div id="students" class="tab-content">
        <div class="card">
            <h3>➕ 新增學生</h3>
            <div style="display: flex; gap: 10px; flex-wrap: wrap;">
                <input type="text" id="newStuName" placeholder="姓名" style="flex:2">
                <input type="number" id="newStuYear" placeholder="年份(如2017)" style="flex:1">
                <select id="newStuGender" style="flex:1">
                    <option value="M">男</option>
                    <option value="F">女</option>
                </select>
                <button class="btn btn-green" onclick="addNewStudent()" style="width:auto">新增</button>
            </div>
        </div>
        <div class="card">
            <h3>📋 學生清單</h3>
            <table id="studentTable">
                <thead><tr><th>姓名</th><th>年份</th><th>性別</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// --- 核心數據 ---
const defaultStudents = [
    {n:"朱政熙", y:2015, g:"M"}, {n:"黃子晴", y:2015, g:"F"},
    {n:"沈卓諾", y:2016, g:"M"}, {n:"朱兆然", y:2016, g:"F"},
    {n:"羅啟鋒", y:2017, g:"M"}, {n:"陳諾彤", y:2017, g:"F"},
    {n:"謝瀚陞", y:2018, g:"M"}, {n:"周暟淳", y:2018, g:"F"}
];

let studentList = JSON.parse(localStorage.getItem('ckc_students')) || defaultStudents;
let records = JSON.parse(localStorage.getItem('ckc_records')) || [];

const events = ["60m", "100m", "200m", "400m", "LJ", "HJ", "SB", "SP", "4x100m"];

// --- 啟動初始化 ---
window.onload = function() {
    initSystem();
};

function initSystem() {
    refreshYearDropdowns();
    refreshEventDropdown();
    updateResNames(); // 初始化姓名列表
    renderStudentAdmin(); // 初始化學生管理表
}

// 刷新所有年份下拉選單
function refreshYearDropdowns() {
    const yearSelect = document.getElementById('resYear');
    const years = [...new Set(studentList.map(s => s.y))].sort((a,b) => b-a);
    
    yearSelect.innerHTML = "";
    years.forEach(y => {
        let opt = document.createElement('option');
        opt.value = y;
        opt.innerHTML = y + " 年";
        yearSelect.appendChild(opt);
    });
}

// 刷新項目下拉選單
function refreshEventDropdown() {
    const evSelect = document.getElementById('resEvent');
    evSelect.innerHTML = "";
    events.forEach(e => {
        let opt = document.createElement('option');
        opt.value = e;
        opt.innerHTML = e;
        evSelect.appendChild(opt);
    });
}

// 根據年份和性別更新姓名選單 (核心修復)
function updateResNames() {
    const year = parseInt(document.getElementById('resYear').value);
    const gender = document.getElementById('resGender').value;
    const nameSelect = document.getElementById('resName');
    
    nameSelect.innerHTML = "";
    
    const filtered = studentList.filter(s => s.y === year && s.g === gender);
    
    if (filtered.length === 0) {
        nameSelect.add(new Option("-- 無匹配學生 --", ""));
    } else {
        filtered.forEach(s => {
            nameSelect.add(new Option(s.n, s.n));
        });
    }
}

// --- 學生管理 ---
function addNewStudent() {
    const name = document.getElementById('newStuName').value.trim();
    const year = parseInt(document.getElementById('newStuYear').value);
    const gender = document.getElementById('newStuGender').value;

    if(!name || !year) return alert("請輸入完整資料");

    studentList.push({ n: name, y: year, g: gender });
    localStorage.setItem('ckc_students', JSON.stringify(studentList));
    
    document.getElementById('newStuName').value = "";
    alert("新增成功！");
    
    initSystem(); // 重新整理所有選單
}

function renderStudentAdmin() {
    const tbody = document.querySelector('#studentTable tbody');
    tbody.innerHTML = "";
    studentList.forEach((s, i) => {
        tbody.innerHTML += `<tr>
            <td>${s.n}</td><td>${s.y}</td><td>${s.g==='M'?'男':'女'}</td>
            <td><button onclick="deleteStudent(${i})" style="color:red">刪除</button></td>
        </tr>`;
    });
}

function deleteStudent(i) {
    if(confirm("確定刪除？")) {
        studentList.splice(i, 1);
        localStorage.setItem('ckc_students', JSON.stringify(studentList));
        initSystem();
    }
}

// --- 成績錄入 ---
function addRecord() {
    const name = document.getElementById('resName').value;
    const val = document.getElementById('resVal').value;
    if(!name || !val) return alert("請選擇學生並輸入成績");

    records.push({
        name: name,
        year: parseInt(document.getElementById('resYear').value),
        gender: document.getElementById('resGender').value,
        event: document.getElementById('resEvent').value,
        res: parseFloat(val),
        date: new Date().toLocaleDateString()
    });
    localStorage.setItem('ckc_records', JSON.stringify(records));
    alert("成績已保存！");
    document.getElementById('resVal').value = "";
}

// --- 分頁切換 ---
function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}
</script>

</body>
</html>

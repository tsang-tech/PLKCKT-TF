<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLK CKC - 體育管理系統 V10</title>
    <style>
        :root { --plk-blue: #1a73e8; --plk-red: #ea4335; --plk-green: #27ae60; --plk-gold: #f39c12; }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 1200px; margin: 0 auto; padding: 15px; background-color: #f4f7f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h1 { color: var(--plk-blue); text-align: center; margin-bottom: 25px; }
        
        /* 導航 */
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; gap: 8px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 30px; cursor: pointer; background: #e0e0e0; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--plk-blue); color: white; box-shadow: 0 4px 10px rgba(26,115,232,0.3); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 輸入框佈局 */
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; }
        .input-label { font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 5px; }
        select, input { padding: 10px; border: 1px solid #ced4da; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 1rem; }
        
        /* 按鈕 */
        .btn { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-blue { background: var(--plk-blue); color: white; }
        .btn-green { background: var(--plk-green); color: white; width: auto; min-width: 120px; }
        .btn-red { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; padding: 5px 12px; font-size: 0.85rem; cursor: pointer; border-radius: 6px; }
        .btn-red:hover { background: #dc2626; color: white; }
        .btn-outline { background: transparent; border: 1px solid #ccc; color: #666; width: auto; padding: 5px 15px; font-size: 0.8rem; margin-bottom: 10px; }
        
        /* 表格 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; font-size: 0.95rem; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; color: #333; position: sticky; top: 0; }
        tr:hover { background-color: #fcfcfc; }
        
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-right: 5px; }
        .badge-comp { background: #e8f0fe; color: #1967d2; border: 1px solid #d2e3fc; }
        
        .scroll-box { max-height: 500px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }
        .flex-between { display: flex; justify-content: space-between; align-items: center; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="no-print">
    <h1>PLK CKC 運動數據管理系統 V10</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('results')">📝 錄入紀錄</button>
        <button class="tab-btn" onclick="switchTab('history')">📜 歷史檔案</button>
        <button class="tab-btn" onclick="switchTab('students')">👥 學生管理</button>
    </div>

    <div id="results" class="tab-content active">
        <div class="card">
            <h3>📍 新增成績數據</h3>
            <div class="input-grid">
                <div class="input-group" style="grid-column: span 2;"><label class="input-label">🏆 比賽名稱</label><input type="text" id="resCompName" placeholder="如：校內選拔賽"></div>
                <div class="input-group"><label class="input-label">📅 比賽日期</label><input type="date" id="resDate"></div>
            </div>
            <div class="input-grid">
                <div class="input-group"><label class="input-label">🎂 出生年份</label><select id="resYear" onchange="updateResNames()"></select></div>
                <div class="input-group"><label class="input-label">🚻 性別</label><select id="resGender" onchange="updateResNames()"><option value="M">男</option><option value="F">女</option></select></div>
                <div class="input-group"><label class="input-label">👤 學生姓名</label><select id="resName"></select></div>
            </div>
            <div class="input-grid">
                <div class="input-group"><label class="input-label">🏃 項目</label><select id="resEvent"></select></div>
                <div class="input-group"><label class="input-label">⏱️ 成績 (秒/米)</label><input type="number" id="resVal" step="0.01"></div>
                <div class="input-group"><label class="input-label">🎖️ 獲獎 (選填)</label><input type="text" id="resAward"></div>
            </div>
            <button class="btn btn-blue" onclick="addRecord()">儲存紀錄</button>
        </div>
    </div>

    <div id="history" class="tab-content">
        <div class="card">
            <h3>📜 歷史紀錄庫</h3>
            <div class="scroll-box">
                <table id="historyTable">
                    <thead><tr><th>日期</th><th>比賽</th><th>姓名</th><th>項目</th><th>成績</th><th>獲獎</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="students" class="tab-content">
        <div class="card">
            <h3>➕ 新增學生</h3>
            <div class="input-grid">
                <div class="input-group"><label class="input-label">姓名</label><input type="text" id="addName" placeholder="輸入姓名"></div>
                <div class="input-group"><label class="input-label">出生年份</label><input type="number" id="addYear" value="2017"></div>
                <div class="input-group"><label class="input-label">性別</label><select id="addGender"><option value="M">男</option><option value="F">女</option></select></div>
                <div class="input-group" style="justify-content: flex-end;"><button class="btn btn-green" onclick="addNewStudent()">新增至名單</button></div>
            </div>
        </div>

        <div class="card">
            <div class="flex-between">
                <h3>👥 現有名單 (<span id="stuCount">0</span> 人)</h3>
                <button class="btn-outline" onclick="resetToFullList()">🔄 恢復 100 人預設名單</button>
            </div>
            <div class="scroll-box">
                <table id="studentTable">
                    <thead><tr><th>姓名</th><th>出生年份</th><th>性別</th><th>操作</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
// --- 預設名單 ---
const DEFAULT_LIST = [
    {n:"陳浩霆", y:2015, g:"M"}, {n:"黃樂童", y:2015, g:"M"}, {n:"林俊宇", y:2015, g:"M"}, {n:"鄭悅朗", y:2015, g:"M"}, {n:"梁匡茗", y:2015, g:"M"}, {n:"劉凱諾", y:2015, g:"M"}, {n:"陳楷洋", y:2015, g:"M"}, {n:"鍾政言", y:2015, g:"M"}, {n:"李泓正", y:2015, g:"M"}, {n:"張焯珽", y:2015, g:"M"}, {n:"黃日希", y:2015, g:"M"},
    {n:"羅文君", y:2015, g:"F"}, {n:"譚念珈", y:2015, g:"F"}, {n:"許芯語", y:2015, g:"F"}, {n:"施驊倩", y:2015, g:"F"}, {n:"黃鈺瞳", y:2015, g:"F"}, {n:"曾釨渘", y:2015, g:"F"}, {n:"王恩烯", y:2015, g:"F"}, {n:"彭乙晴", y:2015, g:"F"}, {n:"顏卡麥拉", y:2015, g:"F"},
    {n:"沈卓諾", y:2016, g:"M"}, {n:"邱梓傑", y:2016, g:"M"}, {n:"劉緻彥", y:2016, g:"M"}, {n:"李宇澤", y:2016, g:"M"}, {n:"黃柏禧", y:2016, g:"M"}, {n:"陳灝軒", y:2016, g:"M"}, {n:"黃梓澧", y:2016, g:"M"}, {n:"岳青辰", y:2016, g:"M"}, {n:"周駿熹", y:2016, g:"M"}, {n:"劉君浩", y:2016, g:"M"}, {n:"梁宇翹", y:2016, g:"M"}, {n:"黃梓浩", y:2016, g:"M"},
    {n:"朱兆然", y:2016, g:"F"}, {n:"張穎忻", y:2016, g:"F"}, {n:"陳曉澄", y:2016, g:"F"}, {n:"伍熹榆", y:2016, g:"F"}, {n:"黃藝之", y:2016, g:"F"}, {n:"高梓翹", y:2016, g:"F"}, {n:"薛雨菲", y:2016, g:"F"}, {n:"葉希嵐", y:2016, g:"F"}, {n:"張懷瑾", y:2016, g:"F"}, {n:"張懷蔚", y:2016, g:"F"}, {n:"楊倬欣", y:2016, g:"F"}, {n:"陳詩晴", y:2016, g:"F"}, {n:"丘倩柔", y:2016, g:"F"},
    {n:"梁匡毅", y:2017, g:"M"}, {n:"郭俊希", y:2017, g:"M"}, {n:"盧鍵霆", y:2017, g:"M"}, {n:"江柏昊", y:2017, g:"M"}, {n:"鄧萃藍", y:2017, g:"M"}, {n:"黃星澧", y:2017, g:"M"}, {n:"彭子恪", y:2017, g:"M"}, {n:"余卓謙", y:2017, g:"M"}, {n:"劉栢熹", y:2017, g:"M"}, {n:"胡梓賢", y:2017, g:"M"}, {n:"麥風", y:2017, g:"M"}, {n:"楊少琪", y:2017, g:"M"}, {n:"徐梓程", y:2017, g:"M"}, {n:"余焌達", y:2017, g:"M"},
    {n:"李思穎", y:2017, g:"F"}, {n:"袁煜婷", y:2017, g:"F"}, {n:"陳浠庭", y:2017, g:"F"}, {n:"曾涴嘉", y:2017, g:"F"}, {n:"陳迦琳", y:2017, g:"F"}, {n:"焦梓涵", y:2017, g:"F"}, {n:"鄧芓游", y:2017, g:"F"}, {n:"蔡蔚言", y:2017, g:"F"}, {n:"方一心", y:2017, g:"F"}, {n:"儲思佳", y:2017, g:"F"}, {n:"徐梓瑤", y:2017, g:"F"}, {n:"陳希妍", y:2017, g:"F"},
    {n:"胡仲希", y:2018, g:"M"}, {n:"黃語浚", y:2018, g:"M"}, {n:"梁喬珀", y:2018, g:"M"}, {n:"鄔嘉樂", y:2018, g:"M"}, {n:"林建宇", y:2018, g:"M"}, {n:"李泓亮", y:2018, g:"M"}, {n:"廖柏希", y:2018, g:"M"}, {n:"伍梓灝", y:2018, g:"M"}, {n:"陳境逸", y:2018, g:"M"}, {n:"李天仁", y:2018, g:"M"}, {n:"黃洛鋋", y:2018, g:"M"}, {n:"杜濼麒", y:2018, g:"M"}, {n:"李宇軒", y:2018, g:"M"},
    {n:"陳希兒", y:2018, g:"F"}, {n:"鄧善殷", y:2018, g:"F"}, {n:"李晉兒", y:2018, g:"F"}, {n:"鄧雅殷", y:2018, g:"F"}, {n:"雪壬愷", y:2018, g:"F"}, {n:"邱曼露", y:2018, g:"F"}, {n:"李心妤", y:2018, g:"F"}, {n:"李梓雯", y:2018, g:"F"}, {n:"張善愉", y:2018, g:"F"}, {n:"麥稀澄", y:2018, g:"F"}, {n:"童文涵", y:2018, g:"F"}, {n:"林靖柔", y:2018, g:"F"}
];

let studentList = JSON.parse(localStorage.getItem('ckc_students')) || DEFAULT_LIST;
let records = JSON.parse(localStorage.getItem('ckc_records')) || [];
const events = ["60m", "100m", "200m", "400m", "LJ", "HJ", "SB", "SP", "4x100m"];

window.onload = function() {
    document.getElementById('resDate').valueAsDate = new Date();
    initSystem();
};

function initSystem() {
    refreshDropdowns();
    renderHistory();
    renderStudentList();
}

// --- 學生管理功能 ---
function addNewStudent() {
    const name = document.getElementById('addName').value.trim();
    const year = parseInt(document.getElementById('addYear').value);
    const gender = document.getElementById('addGender').value;

    if (!name || !year) return alert("請填寫姓名及年份！");

    studentList.push({ n: name, y: year, g: gender });
    saveData();
    alert(`成功新增學生：${name}`);
    document.getElementById('addName').value = "";
    initSystem();
}

function deleteStudent(index) {
    const name = studentList[index].n;
    if (confirm(`確定要將「${name}」從名單中刪除嗎？\n(這不會影響已錄入的成績紀錄)`)) {
        studentList.splice(index, 1);
        saveData();
        initSystem();
    }
}

function renderStudentList() {
    const tbody = document.querySelector('#studentTable tbody');
    document.getElementById('stuCount').innerText = studentList.length;
    tbody.innerHTML = "";
    
    // 按年份降序排序顯示
    let displayList = [...studentList].sort((a,b) => b.y - a.y);
    
    studentList.forEach((s, originalIndex) => {
        tbody.innerHTML += `
            <tr>
                <td><strong>${s.n}</strong></td>
                <td>${s.y} 年</td>
                <td>${s.g === 'M' ? '男' : '女'}</td>
                <td><button class="btn-red" onclick="deleteStudent(${originalIndex})">刪除</button></td>
            </tr>
        `;
    });
}

function resetToFullList() {
    if (confirm("這將會清除您手動新增的學生，並恢復到最初的 100 人名單。確定嗎？")) {
        studentList = [...DEFAULT_LIST];
        saveData();
        initSystem();
    }
}

// --- 成績錄入邏輯 ---
function refreshDropdowns() {
    const yrSel = document.getElementById('resYear');
    const evSel = document.getElementById('resEvent');
    const years = [...new Set(studentList.map(s => s.y))].sort((a,b)=>b-a);
    
    yrSel.innerHTML = "";
    years.forEach(y => yrSel.add(new Option(y + " 年", y)));
    evSel.innerHTML = "";
    events.forEach(e => evSel.add(new Option(e, e)));
    updateResNames();
}

function updateResNames() {
    const yr = parseInt(document.getElementById('resYear').value);
    const g = document.getElementById('resGender').value;
    const nameSel = document.getElementById('resName');
    nameSel.innerHTML = "";
    studentList.filter(s => s.y === yr && s.g === g).forEach(s => nameSel.add(new Option(s.n, s.n)));
}

function addRecord() {
    const name = document.getElementById('resName').value;
    const res = document.getElementById('resVal').value;
    if(!name || !res) return alert("請選擇學生並填寫成績！");
    
    records.unshift({
        id: Date.now(),
        compName: document.getElementById('resCompName').value || "未命名比賽",
        date: document.getElementById('resDate').value,
        name: name,
        year: document.getElementById('resYear').value,
        event: document.getElementById('resEvent').value,
        res: parseFloat(res),
        award: document.getElementById('resAward').value
    });
    saveData();
    alert("成績已儲存！");
    document.getElementById('resVal').value = "";
    renderHistory();
}

function renderHistory() {
    const tbody = document.querySelector('#historyTable tbody');
    tbody.innerHTML = "";
    records.forEach(r => {
        tbody.innerHTML += `
            <tr>
                <td>${r.date}</td>
                <td><span class="badge badge-comp">${r.compName}</span></td>
                <td>${r.name}</td>
                <td>${r.event}</td>
                <td>${r.res}</td>
                <td>${r.award || '-'}</td>
                <td><button class="btn-red" onclick="deleteRecord(${r.id})">刪除</button></td>
            </tr>
        `;
    });
}

function deleteRecord(id) {
    if(confirm("確定刪除紀錄？")) {
        records = records.filter(r => r.id !== id);
        saveData();
        renderHistory();
    }
}

function saveData() {
    localStorage.setItem('ckc_students', JSON.stringify(studentList));
    localStorage.setItem('ckc_records', JSON.stringify(records));
}

function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}
</script>
</body>
</html>

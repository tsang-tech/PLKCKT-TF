<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLK CKC - 體育管理系統 V9</title>
    <style>
        :root { --plk-blue: #1a73e8; --plk-red: #ea4335; --plk-green: #27ae60; --plk-gold: #f39c12; }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 1200px; margin: 0 auto; padding: 15px; background-color: #f4f7f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h1 { color: var(--plk-blue); text-align: center; margin-bottom: 25px; }
        
        /* 導航 */
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; gap: 8px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 30px; cursor: pointer; background: #e0e0e0; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--plk-blue); color: white; box-shadow: 0 4px 10px rgba(26,115,232,0.3); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 輸入框佈局 */
        .input-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 15px; }
        .input-group { display: flex; flex-direction: column; }
        .input-label { font-size: 0.85rem; font-weight: bold; color: #555; margin-bottom: 5px; }
        select, input, textarea { padding: 10px; border: 1px solid #ced4da; border-radius: 8px; width: 100%; box-sizing: border-box; font-size: 1rem; }
        
        /* 按鈕 */
        .btn { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; transition: 0.2s; }
        .btn-blue { background: var(--plk-blue); color: white; }
        .btn-red { background: #fee2e2; color: #dc2626; border: 1px solid #fecaca; padding: 4px 8px; font-size: 0.8rem; width: auto; }
        
        /* 表格樣式 */
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; font-size: 0.9rem; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; color: #333; position: sticky; top: 0; }
        
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; margin-right: 5px; }
        .badge-comp { background: #e8f0fe; color: #1967d2; border: 1px solid #d2e3fc; }
        .badge-award { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
        
        .scroll-box { max-height: 600px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; }

        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<div class="no-print">
    <h1>PLK CKC 運動數據管理系統 V9</h1>
    
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('results')">📝 錄入比賽紀錄</button>
        <button class="tab-btn" onclick="switchTab('history')">📜 歷史紀錄庫</button>
        <button class="tab-btn" onclick="switchTab('students')">👥 學生管理</button>
    </div>

    <div id="results" class="tab-content active">
        <div class="card">
            <h3>📍 新增比賽/測試數據</h3>
            
            <div class="input-grid">
                <div class="input-group" style="grid-column: span 2;">
                    <label class="input-label">🏆 比賽名稱</label>
                    <input type="text" id="resCompName" placeholder="例如：沙田區小學學界田徑比賽、校內選拔賽">
                </div>
                <div class="input-group">
                    <label class="input-label">📅 比賽日期</label>
                    <input type="date" id="resDate">
                </div>
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label class="input-label">🎂 出生年份</label>
                    <select id="resYear" onchange="updateResNames()"></select>
                </div>
                <div class="input-group">
                    <label class="input-label">🚻 性別</label>
                    <select id="resGender" onchange="updateResNames()">
                        <option value="M">男</option>
                        <option value="F">女</option>
                    </select>
                </div>
                <div class="input-group">
                    <label class="input-label">👤 學生姓名</label>
                    <select id="resName"></select>
                </div>
            </div>

            <div class="input-grid">
                <div class="input-group">
                    <label class="input-label">🏃 項目</label>
                    <select id="resEvent"></select>
                </div>
                <div class="input-group">
                    <label class="input-label">⏱️ 成績 (秒/米)</label>
                    <input type="number" id="resVal" step="0.01" placeholder="0.00">
                </div>
                <div class="input-group" style="grid-column: span 1;">
                    <label class="input-label">🎖️ 獲獎紀錄 (選填)</label>
                    <input type="text" id="resAward" placeholder="如：第一名">
                </div>
            </div>
            
            <button class="btn btn-blue" onclick="addRecord()">確認並儲存紀錄</button>
        </div>
    </div>

    <div id="history" class="tab-content">
        <div class="card">
            <h3>📜 全校歷史成績檔案庫</h3>
            <div class="scroll-box">
                <table id="historyTable">
                    <thead>
                        <tr>
                            <th>日期</th>
                            <th>比賽名稱</th>
                            <th>姓名 (年份)</th>
                            <th>項目</th>
                            <th>成績</th>
                            <th>獲獎/備註</th>
                            <th class="no-print">操作</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="students" class="tab-content">
        <div class="card">
            <button class="btn btn-blue" onclick="resetToFullList()" style="width:auto; margin-bottom:15px;">🔄 恢復 100 人預設名單</button>
            <table id="studentTable">
                <thead><tr><th>姓名</th><th>年份</th><th>性別</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// --- 預設名單 (簡化顯示) ---
const FULL_LIST = [
    {n:"陳浩霆", y:2015, g:"M"}, {n:"黃樂童", y:2015, g:"M"}, {n:"林俊宇", y:2015, g:"M"}, {n:"鄭悅朗", y:2015, g:"M"}, {n:"梁匡茗", y:2015, g:"M"}, {n:"劉凱諾", y:2015, g:"M"}, {n:"陳楷洋", y:2015, g:"M"}, {n:"鍾政言", y:2015, g:"M"}, {n:"李泓正", y:2015, g:"M"}, {n:"張焯珽", y:2015, g:"M"}, {n:"黃日希", y:2015, g:"M"},
    {n:"羅文君", y:2015, g:"F"}, {n:"譚念珈", y:2015, g:"F"}, {n:"許芯語", y:2015, g:"F"}, {n:"施驊倩", y:2015, g:"F"}, {n:"黃鈺瞳", y:2015, g:"F"}, {n:"曾釨渘", y:2015, g:"F"}, {n:"王恩烯", y:2015, g:"F"}, {n:"彭乙晴", y:2015, g:"F"}, {n:"顏卡麥拉", y:2015, g:"F"},
    {n:"沈卓諾", y:2016, g:"M"}, {n:"邱梓傑", y:2016, g:"M"}, {n:"劉緻彥", y:2016, g:"M"}, {n:"李宇澤", y:2016, g:"M"}, {n:"黃柏禧", y:2016, g:"M"}, {n:"陳灝軒", y:2016, g:"M"}, {n:"黃梓澧", y:2016, g:"M"}, {n:"岳青辰", y:2016, g:"M"}, {n:"周駿熹", y:2016, g:"M"}, {n:"劉君浩", y:2016, g:"M"}, {n:"梁宇翹", y:2016, g:"M"}, {n:"黃梓浩", y:2016, g:"M"},
    {n:"朱兆然", y:2016, g:"F"}, {n:"張穎忻", y:2016, g:"F"}, {n:"陳曉澄", y:2016, g:"F"}, {n:"伍熹榆", y:2016, g:"F"}, {n:"黃藝之", y:2016, g:"F"}, {n:"高梓翹", y:2016, g:"F"}, {n:"薛雨菲", y:2016, g:"F"}, {n:"葉希嵐", y:2016, g:"F"}, {n:"張懷瑾", y:2016, g:"F"}, {n:"張懷蔚", y:2016, g:"F"}, {n:"楊倬欣", y:2016, g:"F"}, {n:"陳詩晴", y:2016, g:"F"}, {n:"丘倩柔", y:2016, g:"F"},
    {n:"梁匡毅", y:2017, g:"M"}, {n:"郭俊希", y:2017, g:"M"}, {n:"盧鍵霆", y:2017, g:"M"}, {n:"江柏昊", y:2017, g:"M"}, {n:"鄧萃藍", y:2017, g:"M"}, {n:"黃星澧", y:2017, g:"M"}, {n:"彭子恪", y:2017, g:"M"}, {n:"余卓謙", y:2017, g:"M"}, {n:"劉栢熹", y:2017, g:"M"}, {n:"胡梓賢", y:2017, g:"M"}, {n:"麥風", y:2017, g:"M"}, {n:"楊少琪", y:2017, g:"M"}, {n:"徐梓程", y:2017, g:"M"}, {n:"余焌達", y:2017, g:"M"},
    {n:"李思穎", y:2017, g:"F"}, {n:"袁煜婷", y:2017, g:"F"}, {n:"陳浠庭", y:2017, g:"F"}, {n:"曾涴嘉", y:2017, g:"F"}, {n:"陳迦琳", y:2017, g:"F"}, {n:"焦梓涵", y:2017, g:"F"}, {n:"鄧芓游", y:2017, g:"F"}, {n:"蔡蔚言", y:2017, g:"F"}, {n:"方一心", y:2017, g:"F"}, {n:"儲思佳", y:2017, g:"F"}, {n:"徐梓瑤", y:2017, g:"F"}, {n:"陳希妍", y:2017, g:"F"},
    {n:"胡仲希", y:2018, g:"M"}, {n:"黃語浚", y:2018, g:"M"}, {n:"梁喬珀", y:2018, g:"M"}, {n:"鄔嘉樂", y:2018, g:"M"}, {n:"林建宇", y:2018, g:"M"}, {n:"李泓亮", y:2018, g:"M"}, {n:"廖柏希", y:2018, g:"M"}, {n:"伍梓灝", y:2018, g:"M"}, {n:"陳境逸", y:2018, g:"M"}, {n:"李天仁", y:2018, g:"M"}, {n:"黃洛鋋", y:2018, g:"M"}, {n:"杜濼麒", y:2018, g:"M"}, {n:"李宇軒", y:2018, g:"M"},
    {n:"陳希兒", y:2018, g:"F"}, {n:"鄧善殷", y:2018, g:"F"}, {n:"李晉兒", y:2018, g:"F"}, {n:"鄧雅殷", y:2018, g:"F"}, {n:"雪壬愷", y:2018, g:"F"}, {n:"邱曼露", y:2018, g:"F"}, {n:"李心妤", y:2018, g:"F"}, {n:"李梓雯", y:2018, g:"F"}, {n:"張善愉", y:2018, g:"F"}, {n:"麥稀澄", y:2018, g:"F"}, {n:"童文涵", y:2018, g:"F"}, {n:"林靖柔", y:2018, g:"F"}
];

let studentList = JSON.parse(localStorage.getItem('ckc_students')) || FULL_LIST;
let records = JSON.parse(localStorage.getItem('ckc_records')) || [];

const events = ["60m", "100m", "200m", "400m", "LJ", "HJ", "SB", "SP", "4x100m"];

window.onload = function() {
    document.getElementById('resDate').valueAsDate = new Date();
    initSystem();
};

function initSystem() {
    refreshDropdowns();
    renderHistory();
    renderStudentAdmin();
}

function refreshDropdowns() {
    const yrSel = document.getElementById('resYear');
    const evSel = document.getElementById('resEvent');
    const years = [...new Set(studentList.map(s => s.y))].sort((a,b)=>b-a);
    yrSel.innerHTML = "";
    years.forEach(y => yrSel.add(new Option(y + " 年", y)));
    evSel.innerHTML = "";
    events.forEach(e => evSel.add(new Option(e, e)));
    updateResNames();
}

function updateResNames() {
    const yr = parseInt(document.getElementById('resYear').value);
    const g = document.getElementById('resGender').value;
    const nameSel = document.getElementById('resName');
    nameSel.innerHTML = "";
    studentList.filter(s => s.y === yr && s.g === g).forEach(s => nameSel.add(new Option(s.n, s.n)));
}

// --- 核心邏輯 ---
function addRecord() {
    const compName = document.getElementById('resCompName').value.trim() || "未命名比賽";
    const date = document.getElementById('resDate').value;
    const name = document.getElementById('resName').value;
    const event = document.getElementById('resEvent').value;
    const resValue = document.getElementById('resVal').value;
    const award = document.getElementById('resAward').value.trim();

    if(!name || !resValue) return alert("請輸入成績！");

    const newRecord = {
        id: Date.now(),
        compName,
        date,
        name,
        year: document.getElementById('resYear').value,
        event,
        res: parseFloat(resValue),
        award
    };

    records.unshift(newRecord);
    localStorage.setItem('ckc_records', JSON.stringify(records));
    
    alert("紀錄已儲存！");
    document.getElementById('resVal').value = "";
    document.getElementById('resAward').value = "";
    renderHistory();
}

function renderHistory() {
    const tbody = document.querySelector('#historyTable tbody');
    tbody.innerHTML = "";
    records.forEach(r => {
        const unit = ["LJ","HJ","SB","SP"].includes(r.event) ? 'm' : 's';
        tbody.innerHTML += `
            <tr>
                <td>${r.date}</td>
                <td><span class="badge badge-comp">${r.compName}</span></td>
                <td><strong>${r.name}</strong> (${r.year})</td>
                <td>${r.event}</td>
                <td>${r.res}${unit}</td>
                <td>${r.award ? `<span class="badge badge-award">${r.award}</span>` : '-'}</td>
                <td class="no-print"><button class="btn-red" onclick="deleteRecord(${r.id})">刪除</button></td>
            </tr>
        `;
    });
}

function deleteRecord(id) {
    if(confirm("確定刪除？")) {
        records = records.filter(r => r.id !== id);
        localStorage.setItem('ckc_records', JSON.stringify(records));
        renderHistory();
    }
}

function renderStudentAdmin() {
    const tbody = document.querySelector('#studentTable tbody');
    tbody.innerHTML = "";
    studentList.forEach(s => {
        tbody.innerHTML += `<tr><td>${s.n}</td><td>${s.y}</td><td>${s.g==='M'?'男':'女'}</td></tr>`;
    });
}

function resetToFullList() {
    if(confirm("重置學生名單？")) {
        studentList = [...FULL_LIST];
        localStorage.setItem('ckc_students', JSON.stringify(studentList));
        initSystem();
    }
}

function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLK CKT - 體育全功能管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --plk-blue: #1a73e8; --plk-red: #ea4335; --plk-green: #27ae60; --plk-gold: #f39c12; }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 1100px; margin: 0 auto; padding: 15px; background-color: #f4f7f9; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); margin-bottom: 20px; }
        h1, h2, h3 { color: var(--plk-blue); text-align: center; margin-top: 0; }

        /* 導航 */
        .tabs { display: flex; justify-content: center; margin-bottom: 20px; gap: 8px; flex-wrap: wrap; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 30px; cursor: pointer; background: #e0e0e0; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--plk-blue); color: white; box-shadow: 0 4px 10px rgba(26,115,232,0.3); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* 通用表格與表單 */
        .control-panel { display: flex; gap: 15px; background: #fff; padding: 20px; border-radius: 12px; margin-bottom: 20px; align-items: flex-end; flex-wrap: wrap; border: 1px solid #dee2e6; }
        .squad-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .event-box { border: 1px solid #e0e0e0; border-radius: 12px; padding: 15px; background: #ffffff; border-top: 4px solid var(--plk-blue); }

        .athlete-tag { display: inline-flex; align-items: center; background: #f1f8ff; color: #0366d6; padding: 6px 12px; border-radius: 20px; margin: 4px; font-size: 0.9rem; border: 1px solid #c8e1ff; }
        .athlete-tag span { margin-left: 8px; cursor: pointer; color: #d73a49; }

        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; }
        th { background: #f8f9fa; }

        /* 按鈕 */
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-blue { background: var(--plk-blue); color: white; }
        .btn-green { background: var(--plk-green); color: white; }
        .btn-red { background: #fee2e2; color: #dc2626; font-size: 0.8rem; }

        @media print { .no-print { display: none !important; } #printArea { display: block !important; } }
        .input-label { font-size: 0.85rem; font-weight: bold; color: #555; display: block; margin-bottom: 5px; }
        select, input { padding: 10px; border: 1px solid #ced4da; border-radius: 8px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="no-print">
    <h1>PLK CKT 運動數據 & 名單管理系統</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('results')">📊 成績錄入</button>
        <button class="tab-btn" onclick="switchTab('squad')">🏃 出賽排陣</button>
        <button class="tab-btn" onclick="switchTab('students')">👥 學生名單管理</button>
    </div>

    <div id="results" class="tab-content active">
        <div class="card">
            <h3>📍 錄入測試成績</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px;">
                <div><label class="input-label">出生年份</label><select id="resYear" onchange="updateResNames()"></select></div>
                <div><label class="input-label">性別</label><select id="resGender" onchange="updateResNames()"><option value="M">男</option><option value="F">女</option></select></div>
                <div><label class="input-label">學生姓名</label><select id="resName"></select></div>
                <div><label class="input-label">項目</label><select id="resEvent"></select></div>
                <div><label class="input-label">成績</label><input type="number" id="resVal" step="0.01"></div>
            </div>
            <button class="btn btn-blue" onclick="addRecord()" style="margin-top:20px; width:100%;">儲存成績</button>
        </div>
    </div>

    <div id="squad" class="tab-content">
        <div class="control-panel">
            <div style="flex:1"><label class="input-label">比賽</label><select id="sqComp" onchange="renderSquad()"><option value="plk">保良局校際</option><option value="shatin">沙田學界</option><option value="five">沙田五校</option></select></div>
            <div style="flex:1"><label class="input-label">組別</label><select id="sqGrade" onchange="renderSquad()"><option value="A">男甲</option><option value="FA">女甲</option><option value="B">男乙</option><option value="FB">女乙</option><option value="C">男丙</option><option value="FC">女丙</option><option value="D">男丁</option><option value="FD">女丁</option></select></div>
            <button class="btn btn-blue" onclick="autoRecommend()">🤖 AI 智能越級排陣</button>
            <button class="btn btn-green" onclick="window.print()">🖨️ 打印報名表</button>
        </div>
        <div id="squadArea" class="squad-grid"></div>
    </div>

    <div id="students" class="tab-content">
        <div class="card">
            <h3>➕ 新增學生</h3>
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px;">
                <div><label class="input-label">學生姓名</label><input type="text" id="newStuName" placeholder="例如：陳大文"></div>
                <div><label class="input-label">出生年份</label><input type="number" id="newStuYear" value="2017"></div>
                <div><label class="input-label">性別</label><select id="newStuGender"><option value="M">男子組</option><option value="F">女子組</option></select></div>
                <button class="btn btn-green" onclick="addNewStudent()" style="height:42px; margin-top:24px;">確認新增</button>
            </div>
        </div>
        <div class="card">
            <h3>📋 現有學生名錄</h3>
            <div class="control-panel">
                <select id="filterYear" onchange="renderStudentAdmin()"></select>
                <select id="filterGender" onchange="renderStudentAdmin()"><option value="M">男</option><option value="F">女</option></select>
            </div>
            <table id="studentTable">
                <thead><tr><th>姓名</th><th>年份</th><th>性別</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<div id="printArea" style="display:none;">

    <table id="printTable" class="print-table" style="width:100%; border-collapse:collapse;"></table>
</div>

function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));

}

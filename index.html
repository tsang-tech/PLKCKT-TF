<!DOCTYPE html>
<html lang="zh-Hant">
<head>
   <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0">
   <title>PLK CKC 體育管理系統 V13</title>
   <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
   <style>
       :root { --plk-blue: #1a73e8; --plk-red: #ea4335; --plk-green: #27ae60; --plk-gold: #f39c12; --plk-dark: #34495e; }
       body { font-family: "Microsoft JhengHei", sans-serif; max-width: 1300px; margin: 0 auto; padding: 10px; background-color: #f0f2f5; color: #333; }
       .card { background: white; padding: 18px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
       h1 { color: var(--plk-blue); text-align: center; font-size: 1.5rem; margin-bottom: 15px; }

       /* Tab 導航 */
       .tabs { display: flex; overflow-x: auto; gap: 5px; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 2px solid #ddd; }
       .tab-btn { padding: 10px 20px; border: none; border-radius: 10px 10px 0 0; cursor: pointer; background: #eee; font-weight: bold; white-space: nowrap; transition: 0.3s; }
       .tab-btn.active { background: var(--plk-blue); color: white; }

       /* 佈局與輸入 */
       .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
       select, input { padding: 10px; border: 1px solid #ccc; border-radius: 8px; width: 100%; font-size: 1rem; box-sizing: border-box; }
       .btn { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 5px; }
       .btn-blue { background: var(--plk-blue); color: white; }
       .btn-green { background: var(--plk-green); color: white; }
       .btn-orange { background: var(--plk-gold); color: white; }
       .btn-dark { background: var(--plk-dark); color: white; }

       /* 排陣樣式 */
       .squad-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
       .event-slot-card { border-left: 5px solid var(--plk-blue); background: #f9f9f9; padding: 12px; border-radius: 4px; }
       .slot-pill { display: inline-block; background: #fff; border: 1px dashed #aaa; padding: 6px 12px; margin: 4px; border-radius: 4px; font-size: 0.9rem; cursor: pointer; min-width: 80px; text-align: center; }
       .slot-filled { border-style: solid; background: #e8f0fe; color: #1967d2; border-color: var(--plk-blue); font-weight: bold; }

       /* 系統工具區塊 */
       .tool-box { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 10px; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e0e0e0; }

       /* 打印與表格 */
       table { width: 100%; border-collapse: collapse; margin-top: 10px; }
       th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
       th { background: #f8f9fa; }

       #printArea { display: none; }
       @media print {
           .no-print { display: none !important; }
           #printArea { display: block !important; }
           table { border: 1px solid #000; }
           th, td { border: 1px solid #000; text-align: center; }
       }
   </style>
</head>
<body>

<div class="no-print">
   <h1>PLK CKC 數據管理與排陣系統 V13</h1>

   <div class="tabs">
       <button class="tab-btn active" onclick="switchTab('results')">📝 成績錄入</button>
       <button class="tab-btn" onclick="switchTab('analysis')">📈 進步曲線</button>
       <button class="tab-btn" onclick="switchTab('squad')">🏃 排陣管理</button>
       <button class="tab-btn" onclick="switchTab('students')">⚙️ 學生與系統管理</button>
   </div>

   <div id="results" class="tab-content active">
       <div class="card">
           <h3>📍 錄入比賽/測試數據</h3>
           <div class="grid">
               <input type="text" id="resCompName" placeholder="比賽名稱">
               <input type="date" id="resDate">
               <select id="resYear" onchange="updateResNames()"></select>
               <select id="resGender" onchange="updateResNames()"><option value="M">男</option><option value="F">女</option></select>
               <select id="resName"></select>
           </div>
           <div class="grid" style="margin-top:10px;">
               <select id="resEvent"></select>
               <input type="number" id="resVal" step="0.01" placeholder="成績">
               <input type="text" id="resAward" placeholder="獲獎/備註">
               <button class="btn btn-blue" onclick="addRecord()">💾 儲存成績</button>
           </div>
       </div>
   </div>

   <div id="analysis" class="tab-content">
       <div class="card">
           <h3>📈 同儕成績分析</h3>
           <div class="grid" style="margin-bottom:15px;">
               <select id="chartYear" onchange="updateChart()"></select>
               <select id="chartGender" onchange="updateChart()"><option value="M">男</option><option value="F">女</option></select>
               <select id="chartEvent" onchange="updateChart()"></select>
           </div>
           <div style="height:400px;"><canvas id="compareChart"></canvas></div>
       </div>
   </div>

   <div id="squad" class="tab-content">
       <div class="card">
           <div class="grid">
               <select id="sqComp" onchange="renderSquadBoard()">
                   <option value="plk">（保良局）全港屬下小學田徑賽</option>
                   <option value="shatin">（學界）沙田小學校際田徑賽</option>
                   <option value="five">（五校）保良局沙田區五校賽</option>
               </select>
               <select id="sqGrade" onchange="renderSquadBoard()">
                   <option value="A">男子甲組</option><option value="FA">女子甲組</option>
                   <option value="B">男子乙組</option><option value="FB">女子乙組</option>
                   <option value="C">男子丙組</option><option value="FC">女子丙組</option>
                   <option value="D">男子丁組</option><option value="FD">女子丁組</option>
               </select>
               <button class="btn btn-dark" onclick="window.print()">🖨️ 列印此名單</button>
           </div>
       </div>
       <div id="squadBoard" class="squad-container"></div>
   </div>

   <div id="students" class="tab-content">
       <div class="card">
           <h3>🛠️ 系統工具 (備份與還原)</h3>
           <div class="tool-box">
               <button class="btn btn-green" onclick="exportData()">📤 備份數據 (匯出 JSON)</button>
               <button class="btn btn-orange" onclick="document.getElementById('importFile').click()">📥 匯入數據 (還原備份)</button>
               <input type="file" id="importFile" style="display:none" accept=".json" onchange="importData(event)">
               <button class="btn" style="background:#ccc;" onclick="resetToFullList()">🔄 恢復 100 人預設名單</button>
           </div>
           <p style="font-size: 0.8rem; color: #666;">* 建議每次大型比賽錄入完畢後都備份一次檔案。</p>
       </div>

       <div class="card">
           <h3>👥 運動員名單庫</h3>
           <div id="stuListArea" style="max-height: 400px; overflow-y: auto;"></div>
       </div>
   </div>
</div>

<div id="printArea">
   <h2 id="printTitle" style="text-align:center;"></h2>
   <p id="printSubtitle" style="text-align:center;"></p>
   <table style="width:100%; border-collapse:collapse;">
       <thead><tr><th>項目</th><th>運動員</th></tr></thead>
       <tbody id="printBody"></tbody>
   </table>
</div>

<div id="pickerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
   <div class="card" style="width:90%; max-width:400px; max-height:80vh; overflow-y:auto;">
       <h4 id="pickerTitle">選擇運動員</h4>
       <div id="pickerList"></div>
       <button class="btn btn-blue" onclick="closePicker()" style="margin-top:10px; background:#666; width:100%;">關閉</button>
   </div>
</div>

<script>
// --- 初始化數據 ---
const DEFAULT_STUDENTS = [
   {n:"陳浩霆", y:2015, g:"M"}, {n:"黃樂童", y:2015, g:"M"}, {n:"林俊宇", y:2015, g:"M"}, {n:"鄭悅朗", y:2015, g:"M"}, {n:"梁匡茗", y:2015, g:"M"}, {n:"劉凱諾", y:2015, g:"M"}, {n:"陳楷洋", y:2015, g:"M"}, {n:"鍾政言", y:2015, g:"M"}, {n:"李泓正", y:2015, g:"M"}, {n:"張焯珽", y:2015, g:"M"}, {n:"黃日希", y:2015, g:"M"},
   {n:"羅文君", y:2015, g:"F"}, {n:"譚念珈", y:2015, g:"F"}, {n:"許芯語", y:2015, g:"F"}, {n:"施驊倩", y:2015, g:"F"}, {n:"黃鈺瞳", y:2015, g:"F"}, {n:"曾釨渘", y:2015, g:"F"}, {n:"王恩烯", y:2015, g:"F"}, {n:"彭乙晴", y:2015, g:"F"}, {n:"顏卡麥拉", y:2015, g:"F"},
   {n:"沈卓諾", y:2016, g:"M"}, {n:"邱梓傑", y:2016, g:"M"}, {n:"劉緻彥", y:2016, g:"M"}, {n:"李宇澤", y:2016, g:"M"}, {n:"黃柏禧", y:2016, g:"M"}, {n:"陳灝軒", y:2016, g:"M"}, {n:"黃梓澧", y:2016, g:"M"}, {n:"岳青辰", y:2016, g:"M"}, {n:"周駿熹", y:2016, g:"M"}, {n:"劉君浩", y:2016, g:"M"}, {n:"梁宇翹", y:2016, g:"M"}, {n:"黃梓浩", y:2016, g:"M"},
   {n:"朱兆然", y:2016, g:"F"}, {n:"張穎忻", y:2016, g:"F"}, {n:"陳曉澄", y:2016, g:"F"}, {n:"伍熹榆", y:2016, g:"F"}, {n:"黃藝之", y:2016, g:"F"}, {n:"高梓翹", y:2016, g:"F"}, {n:"薛雨菲", y:2016, g:"F"}, {n:"葉希嵐", y:2016, g:"F"}, {n:"張懷瑾", y:2016, g:"F"}, {n:"張懷蔚", y:2016, g:"F"}, {n:"楊倬欣", y:2016, g:"F"}, {n:"陳詩晴", y:2016, g:"F"}, {n:"丘倩柔", y:2016, g:"F"},
   {n:"梁匡毅", y:2017, g:"M"}, {n:"郭俊希", y:2017, g:"M"}, {n:"盧鍵霆", y:2017, g:"M"}, {n:"江柏昊", y:2017, g:"M"}, {n:"鄧萃藍", y:2017, g:"M"}, {n:"黃星澧", y:2017, g:"M"}, {n:"彭子恪", y:2017, g:"M"}, {n:"余卓謙", y:2017, g:"M"}, {n:"劉栢熹", y:2017, g:"M"}, {n:"胡梓賢", y:2017, g:"M"}, {n:"麥風", y:2017, g:"M"}, {n:"楊少琪", y:2017, g:"M"}, {n:"徐梓程", y:2017, g:"M"}, {n:"余焌達", y:2017, g:"M"},
   {n:"李思穎", y:2017, g:"F"}, {n:"袁煜婷", y:2017, g:"F"}, {n:"陳浠庭", y:2017, g:"F"}, {n:"曾涴嘉", y:2017, g:"F"}, {n:"陳迦琳", y:2017, g:"F"}, {n:"焦梓涵", y:2017, g:"F"}, {n:"鄧芓游", y:2017, g:"F"}, {n:"蔡蔚言", y:2017, g:"F"}, {n:"方一心", y:2017, g:"F"}, {n:"儲思佳", y:2017, g:"F"}, {n:"徐梓瑤", y:2017, g:"F"}, {n:"陳希妍", y:2017, g:"F"},
   {n:"胡仲希", y:2018, g:"M"}, {n:"黃語浚", y:2018, g:"M"}, {n:"梁喬珀", y:2018, g:"M"}, {n:"鄔嘉樂", y:2018, g:"M"}, {n:"林建宇", y:2018, g:"M"}, {n:"李泓亮", y:2018, g:"M"}, {n:"廖柏希", y:2018, g:"M"}, {n:"伍梓灝", y:2018, g:"M"}, {n:"陳境逸", y:2018, g:"M"}, {n:"李天仁", y:2018, g:"M"}, {n:"黃洛鋋", y:2018, g:"M"}, {n:"杜濼麒", y:2018, g:"M"}, {n:"李宇軒", y:2018, g:"M"},
   {n:"陳希兒", y:2018, g:"F"}, {n:"鄧善殷", y:2018, g:"F"}, {n:"李晉兒", y:2018, g:"F"}, {n:"鄧雅殷", y:2018, g:"F"}, {n:"雪壬愷", y:2018, g:"F"}, {n:"邱曼露", y:2018, g:"F"}, {n:"李心妤", y:2018, g:"F"}, {n:"櫻井美奈", y:2018, g:"F"}, {n:"張善愉", y:2018, g:"F"}, {n:"麥稀澄", y:2018, g:"F"}, {n:"童文涵", y:2018, g:"F"}, {n:"林靖柔", y:2018, g:"F"}
];

const QUOTAS = {
   plk: { name: "全港保良局屬下小學田徑賽", A: {"60m":2,"100m":2,"200m":2,"400m":1,"跳遠":1,"跳高":1,"擲壘球":1,"推鉛球":1,"4x100m":6}, B: {"60m":2,"100m":2,"200m":2,"跳遠":1,"擲壘球":1,"4x100m":6}, C: {"60m":2,"100m":2,"跳遠":1,"4x100m":6} },
   shatin: { name: "沙田小學校際田徑賽", A: {"60m":2,"100m":2,"200m":2,"400m":1,"跳遠":1,"跳高":1,"擲壘球":1,"推鉛球":1,"4x100m":6}, B: {"60m":2,"100m":2,"200m":2,"跳遠":1,"跳高":1,"擲壘球":1,"4x100m":6}, C: {"60m":2,"100m":2,"跳遠":1,"4x100m":6} },
   five: { name: "保良局沙田區五校賽", A: {"100m":4,"200m":4,"跳遠":2,"推鉛球":2,"4x100m":6}, B: {"100m":4,"200m":4,"跳遠":2,"推鉛球":2,"4x100m":6}, C: {"60m":4,"100m":4,"跳遠":2,"擲壘球":2,"4x100m":6}, D: {"60m":4,"100m":4,"跳遠":2,"擲壘球":2,"4x100m":6} }
};

let students = JSON.parse(localStorage.getItem('ckc_stu')) || DEFAULT_STUDENTS;
let records = JSON.parse(localStorage.getItem('ckc_rec')) || [];
let squads = JSON.parse(localStorage.getItem('ckc_sq')) || {};
const events = ["60m", "100m", "200m", "400m", "跳遠", "跳高", "擲壘球", "推鉛球", "4x100m"];
let chartInstance = null;
let activeSlot = null;

window.onload = () => {
   document.getElementById('resDate').valueAsDate = new Date();
   initUI();
};

function initUI() {
   ['resYear', 'chartYear'].forEach(id => {
       const el = document.getElementById(id); el.innerHTML = "";
       [2015, 2016, 2017, 2018].forEach(y => el.add(new Option(`${y}年`, y)));
   });
   ['resEvent', 'chartEvent'].forEach(id => {
       const el = document.getElementById(id); el.innerHTML = "";
       events.forEach(e => el.add(new Option(e, e)));
   });
   updateResNames(); renderSquadBoard(); renderStudentAdmin();
}

// --- 備份與匯入功能 ---
function exportData() {
   const data = { students, records, squads, timestamp: new Date().toISOString() };
   const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
   const url = URL.createObjectURL(blob);
   const a = document.createElement('a');
   a.href = url;
   a.download = `PLK_CKC_Backup_${new Date().toLocaleDateString().replace(/\//g, '-')}.json`;
   a.click();
}

function importData(event) {
   const file = event.target.files[0];
   if (!file) return;
   const reader = new FileReader();
   reader.onload = (e) => {
       try {
           const imported = JSON.parse(e.target.result);
           if (imported.students && imported.records) {
               if(confirm("匯入將覆蓋現有所有資料，確定嗎？")) {
                   students = imported.students;
                   records = imported.records;
                   squads = imported.squads || {};
                   saveAll();
                   alert("匯入成功！系統將重新載入。");
                   location.reload();
               }
           } else { alert("錯誤：無效的備份檔案格式。"); }
       } catch (err) { alert("讀取檔案失敗。"); }
   };
   reader.readAsText(file);
}

function saveAll() {
   localStorage.setItem('ckc_stu', JSON.stringify(students));
   localStorage.setItem('ckc_rec', JSON.stringify(records));
   localStorage.setItem('ckc_sq', JSON.stringify(squads));
}

// --- 核心邏輯 (延續 V12) ---
function getGrade(y) { return y===2015?"A":y===2016?"B":y===2017?"C":"D"; }

function renderSquadBoard() {
   const comp = document.getElementById('sqComp').value;
   const gKey = document.getElementById('sqGrade').value;
   const gender = gKey.startsWith('F') ? 'F' : 'M';
   const grade = gKey.replace('F', '');
   const board = document.getElementById('squadBoard'); board.innerHTML = "";
   const pBody = document.getElementById('printBody'); pBody.innerHTML = "";

   document.getElementById('printTitle').innerText = QUOTAS[comp].name;
   document.getElementById('printSubtitle').innerText = `${gender==='M'?'男子':'女子'}${grade}組名單`;

   const qSet = QUOTAS[comp][grade] || {};
   Object.keys(qSet).forEach(ev => {
       const quota = qSet[ev];
       const key = `${comp}_${gKey}_${ev}`;
       const names = squads[key] || [];
       let pills = "";
       let namesOnly = [];
       for(let i=0; i<quota; i++) {
           const n = names[i] || "待選擇";
           pills += `<div class="slot-pill ${n!=='待選擇'?'slot-filled':''}" onclick="openPicker('${key}', ${i}, '${grade}', '${gender}', '${ev}')">${n}</div>`;
           if(n!=="待選擇") namesOnly.push(n);
       }
       board.innerHTML += `<div class="event-slot-card"><strong>${ev}</strong> (限${quota})<div>${pills}</div></div>`;
       pBody.innerHTML += `<tr><td>${ev}</td><td>${namesOnly.join(', ') || '--'}</td></tr>`;
   });
}

function openPicker(key, index, grade, gender, ev) {
   activeSlot = { key, index };
   const list = document.getElementById('pickerList');
   list.innerHTML = `<button class="btn" style="width:100%; margin-bottom:10px; background:#fdd;" onclick="selectAthlete('')">❌ 清空位置</button>`;
   const weight = {"A":4,"B":3,"C":2,"D":1};
   students.filter(s => s.g===gender && weight[getGrade(s.y)] <= weight[grade]).forEach(s => {
       const myRecs = records.filter(r => r.name === s.n && r.event === ev);
       const pb = myRecs.length > 0 ? (["跳遠","跳高","擲壘球","推鉛球"].includes(ev)?Math.max(...myRecs.map(r=>r.val)):Math.min(...myRecs.map(r=>r.val))) : null;
       const btn = document.createElement('button');
       btn.className = "btn"; btn.style = "width:100%; margin-bottom:5px; text-align:left; background:#fff; border:1px solid #ddd; display:flex; justify-content:space-between;";
       btn.innerHTML = `<span>${s.n} (${getGrade(s.y)})</span><span style="color:var(--plk-gold)">${pb?'PB: '+pb:''}</span>`;
       btn.onclick = () => selectAthlete(s.n);
       list.appendChild(btn);
   });
   document.getElementById('pickerModal').style.display = "flex";
}

function selectAthlete(n) {
   if(!squads[activeSlot.key]) squads[activeSlot.key] = [];
   if(n==="") squads[activeSlot.key].splice(activeSlot.index,1); else squads[activeSlot.key][activeSlot.index] = n;
   saveAll(); document.getElementById('pickerModal').style.display = "none"; renderSquadBoard();
}

function closePicker() { document.getElementById('pickerModal').style.display = "none"; }

function addRecord() {
   const rec = { id: Date.now(), comp: document.getElementById('resCompName').value || "測試", date: document.getElementById('resDate').value, name: document.getElementById('resName').value, year: parseInt(document.getElementById('resYear').value), gender: document.getElementById('resGender').value, event: document.getElementById('resEvent').value, val: parseFloat(document.getElementById('resVal').value), award: document.getElementById('resAward').value };
   if(!rec.name || isNaN(rec.val)) return alert("請填寫姓名及成績");
   records.push(rec); saveAll(); alert("成績已儲存");
}

function updateChart() {
   const yr = parseInt(document.getElementById('chartYear').value), g = document.getElementById('chartGender').value, ev = document.getElementById('chartEvent').value;
   const filtered = records.filter(r => r.year === yr && r.gender === g && r.event === ev).sort((a,b) => new Date(a.date) - new Date(b.date));
   const studentData = {};
   filtered.forEach(r => { if(!studentData[r.name]) studentData[r.name] = []; studentData[r.name].push({ x: r.date, y: r.val }); });
   const datasets = Object.keys(studentData).map((name, idx) => ({ label: name, data: studentData[name], borderColor: `hsl(${(idx*70)%360},70%,50%)`, fill: false }));
   if(chartInstance) chartInstance.destroy();
   chartInstance = new Chart(document.getElementById('compareChart').getContext('2d'), { type: 'line', data: { datasets }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { reverse: !["跳遠","跳高","擲壘球","推鉛球"].includes(ev) } } } });
}

function switchTab(id) {
   document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
   document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
   document.getElementById(id).classList.add('active');
   event.currentTarget.classList.add('active');
   if(id === 'analysis') setTimeout(updateChart, 100);
}

function updateResNames() {
   const yr = parseInt(document.getElementById('resYear').value), g = document.getElementById('resGender').value;
   const sel = document.getElementById('resName'); sel.innerHTML = "";
   students.filter(s => s.y === yr && s.g === g).forEach(s => sel.add(new Option(s.n, s.n)));
}

function renderStudentAdmin() {
   document.getElementById('stuListArea').innerHTML = `<table><tr><th>姓名</th><th>年份</th><th>操作</th></tr>` +
       students.map((s, i) => `<tr><td>${s.n}</td><td>${s.y}</td><td><button onclick="deleteStu(${i})" style="color:red">刪除</button></td></tr>`).join('') + `</table>`;
}

function deleteStu(i) { if(confirm("確定刪除？")) { students.splice(i,1); saveAll(); renderStudentAdmin(); } }

function resetToFullList() { if(confirm("確定重置名單？")) { students = [...DEFAULT_STUDENTS]; saveAll(); renderStudentAdmin(); } }
</script>

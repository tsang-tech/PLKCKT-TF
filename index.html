<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PLK CKC 體育管理系統 V18</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --plk-blue: #1a73e8; --plk-red: #ea4335; --plk-green: #27ae60; --plk-gold: #f39c12; --plk-dark: #34495e; }
        body { font-family: "Microsoft JhengHei", sans-serif; max-width: 1300px; margin: 0 auto; padding: 10px; background-color: #f0f2f5; color: #333; }
        .card { background: white; padding: 18px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 15px; }
        h1 { color: var(--plk-blue); text-align: center; font-size: 1.5rem; margin-bottom: 15px; }
        
        /* Tab 導航：按一下才顯示內容 */
        .tabs { display: flex; overflow-x: auto; gap: 5px; margin-bottom: 15px; padding-bottom: 5px; border-bottom: 2px solid #ddd; }
        .tab-btn { padding: 10px 20px; border: none; border-radius: 10px 10px 0 0; cursor: pointer; background: #eee; font-weight: bold; white-space: nowrap; transition: 0.3s; }
        .tab-btn.active { background: var(--plk-blue); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        select, input { padding: 10px; border: 1px solid #ccc; border-radius: 8px; width: 100%; font-size: 1rem; box-sizing: border-box; }
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 5px; font-size: 0.9rem; }
        .btn-blue { background: var(--plk-blue); color: white; }
        .btn-green { background: var(--plk-green); color: white; }
        .btn-red { background: var(--plk-red); color: white; }
        .btn-orange { background: var(--plk-gold); color: white; }
        .btn-dark { background: var(--plk-dark); color: white; }

        .table-wrapper { max-height: 450px; overflow-y: auto; border: 1px solid #eee; border-radius: 8px; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; background: white; font-size: 0.9rem; }
        th, td { border: 1px solid #eee; padding: 10px; text-align: left; }
        th { background: #f4f7f6; position: sticky; top: 0; z-index: 10; }

        .top5-badge { background: #fff8e1; border: 1px solid #ffe082; padding: 15px; border-radius: 8px; margin-top: 20px; }
        .squad-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; }
        .event-slot-card { border-left: 5px solid var(--plk-blue); background: #f9f9f9; padding: 12px; border-radius: 4px; }
        .slot-pill { display: inline-block; background: #fff; border: 1px dashed #aaa; padding: 6px 12px; margin: 4px; border-radius: 4px; font-size: 0.85rem; cursor: pointer; }
        .slot-filled { border-style: solid; background: #e8f0fe; color: #1967d2; border-color: var(--plk-blue); font-weight: bold; }

        @media print { .no-print { display: none !important; } #printArea { display: block !important; } table { border: 1px solid #000; } }
    </style>
</head>
<body>

<div class="no-print">
    <h1>PLK CKC 體育管理系統 V18 (Excel 版)</h1>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('results')">📝 成績錄入與編輯</button>
        <button class="tab-btn" onclick="switchTab('analysis')">📈 分析與排行榜</button>
        <button class="tab-btn" onclick="switchTab('squad')">🏃 排陣管理</button>
        <button class="tab-btn" onclick="switchTab('students')">⚙️ 隊員與數據備份</button>
    </div>

    <div id="results" class="tab-content active">
        <div class="card">
            <h3 id="formTitle">📍 新增/編輯成績</h3>
            <input type="hidden" id="editModeId" value="">
            <div class="grid">
                <input type="text" id="resCompName" placeholder="比賽/測試名稱">
                <input type="date" id="resDate">
                <input type="number" id="resYear" placeholder="學生出生年份" onchange="updateResNames()">
                <select id="resGender" onchange="updateResNames()"><option value="M">男</option><option value="F">女</option></select>
                <select id="resName"></select>
            </div>
            <div class="grid" style="margin-top:10px;">
                <select id="resEvent"></select>
                <input type="number" id="resVal" step="0.01" placeholder="成績 (秒/米)">
                <input type="text" id="resAward" placeholder="備註">
                <button id="saveBtn" class="btn btn-blue" onclick="saveRecord()">💾 儲存數據</button>
                <button id="cancelBtn" class="btn btn-dark" style="display:none;" onclick="cancelEdit()">取消</button>
            </div>
        </div>
        <div class="card">
            <h3>📜 歷史紀錄 (點擊編輯修改)</h3>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>日期</th><th>姓名</th><th>項目</th><th>成績</th><th>比賽</th><th>操作</th></tr></thead>
                    <tbody id="recordListArea"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="analysis" class="tab-content">
        <div class="card">
            <div class="grid">
                <input type="number" id="chartYear" placeholder="年份" onchange="updateAnalysis()" value="2015">
                <select id="chartGender" onchange="updateAnalysis()"><option value="M">男</option><option value="F">女</option></select>
                <select id="chartEvent" onchange="updateAnalysis()"></select>
            </div>
            <div style="height:350px; margin-top:15px;"><canvas id="compareChart"></canvas></div>
        </div>
        <div class="card top5-badge">
            <h3 style="margin-top:0; color: var(--plk-gold);">🏆 項目歷史五強 (學生不重複)</h3>
            <table>
                <thead><tr style="background:#fff3e0;"><th>排名</th><th>姓名</th><th>成績</th><th>比賽名稱</th><th>日期</th></tr></thead>
                <tbody id="top5Area"></tbody>
            </table>
            <p id="top5Empty" style="text-align:center; color:#999; display:none;">暫無相關數據</p>
        </div>
    </div>

    <div id="squad" class="tab-content">
        <div class="card">
            <div class="grid">
                <select id="sqComp" onchange="renderSquadBoard()"><option value="plk">（保良局）屬下小學賽</option><option value="shatin">（學界）沙田區賽</option><option value="five">（五校）五校聯賽</option></select>
                <select id="sqGrade" onchange="renderSquadBoard()"><option value="A">男甲</option><option value="FA">女甲</option><option value="B">男乙</option><option value="FB">女乙</option><option value="C">男丙</option><option value="FC">女丙</option></select>
                <button class="btn btn-dark" onclick="window.print()">🖨️ 列印名單</button>
            </div>
        </div>
        <div id="squadBoard" class="squad-container"></div>
    </div>

    <div id="students" class="tab-content">
        <div class="card">
            <h3>👥 隊員管理 (新增年份不限)</h3>
            <div class="grid">
                <input type="text" id="newStuName" placeholder="姓名">
                <input type="number" id="newStuYear" placeholder="年份 (如 2019)" value="2019">
                <select id="newStuGender"><option value="M">男</option><option value="F">女</option></select>
                <button class="btn btn-green" onclick="addNewStudent()">➕ 加入</button>
            </div>
            <div class="table-wrapper"><table><thead><tr><th>姓名</th><th>年份</th><th>性別</th><th>操作</th></tr></thead><tbody id="stuListArea"></tbody></table></div>
        </div>

        <div class="card" style="background: #eef7ff; border: 2px dashed var(--plk-blue);">
            <h3>📊 數據中心 (Excel 雙向傳輸)</h3>
            <p style="font-size:0.85rem; color:#666;">* 匯出的 Excel 檔案包含學生、成績、排陣三個分頁。</p>
            <div style="display:flex; gap:10px; flex-wrap:wrap;">
                <button class="btn btn-blue" onclick="exportToExcel()">📤 匯出為 Excel (.xlsx)</button>
                <button class="btn btn-dark" onclick="document.getElementById('importFile').click()">📥 匯入 Excel 檔案</button>
                <input type="file" id="importFile" style="display:none" accept=".xlsx" onchange="importFromExcel(event)">
                <button class="btn btn-red" onclick="resetSystem()">⚠️ 清空系統</button>
            </div>
        </div>
    </div>
</div>

<div id="pickerModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; justify-content:center; align-items:center;">
    <div class="card" style="width:90%; max-width:400px;"><h4>選擇運動員</h4><div id="pickerList"></div><button class="btn btn-blue" onclick="closePicker()" style="background:#666; width:100%;">關閉</button></div>
</div>

<script>
// --- 核心數據變量 ---
let students = JSON.parse(localStorage.getItem('ckc_stu')) || [{n:"示例學生",y:2015,g:"M"}];
let records = JSON.parse(localStorage.getItem('ckc_rec')) || [];
let squads = JSON.parse(localStorage.getItem('ckc_sq')) || {};
const events = ["60m", "100m", "200m", "400m", "跳遠", "跳高", "擲壘球", "推鉛球", "4x100m"];
let chartInstance = null;
let activeSlot = null;

window.onload = () => {
    document.getElementById('resDate').valueAsDate = new Date();
    ['resEvent', 'chartEvent'].forEach(id => {
        const el = document.getElementById(id); el.innerHTML = "";
        events.forEach(e => el.add(new Option(e, e)));
    });
    refreshAll();
};

function refreshAll() {
    updateResNames(); renderRecords(); renderStudentAdmin(); renderSquadBoard();
}

function switchTab(id) {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
    if(id === 'analysis') setTimeout(updateAnalysis, 100);
}

// --- Excel 匯出功能 ---
function exportToExcel() {
    const wb = XLSX.utils.book_new();

    // 1. 學生分頁
    const ws_stu = XLSX.utils.json_to_sheet(students.map(s => ({ "姓名": s.n, "出生年份": s.y, "性別(M/F)": s.g })));
    XLSX.utils.book_append_sheet(wb, ws_stu, "Students");

    // 2. 成績分頁
    const ws_rec = XLSX.utils.json_to_sheet(records.map(r => ({ "日期": r.date, "姓名": r.name, "年份": r.year, "性別": r.gender, "項目": r.event, "成績": r.val, "比賽": r.comp, "備註": r.award })));
    XLSX.utils.book_append_sheet(wb, ws_rec, "Records");

    // 3. 排陣分頁 (扁平化處理)
    const squadData = [];
    for(let key in squads) {
        squadData.push({ "位置Key": key, "名單": squads[key].join(', ') });
    }
    const ws_sq = XLSX.utils.json_to_sheet(squadData);
    XLSX.utils.book_append_sheet(wb, ws_sq, "Squads");

    XLSX.writeFile(wb, `PLK_CKC_Management_System_${new Date().toLocaleDateString()}.xlsx`);
}

// --- Excel 匯入功能 ---
function importFromExcel(event) {
    const file = event.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
        const data = new Uint8Array(e.target.result);
        const workbook = XLSX.read(data, { type: 'array' });

        if(confirm("匯入 Excel 將覆蓋當前所有數據，確定嗎？")) {
            // 解析學生
            if(workbook.Sheets["Students"]) {
                const json_stu = XLSX.utils.sheet_to_json(workbook.Sheets["Students"]);
                students = json_stu.map(item => ({ n: item["姓名"], y: item["出生年份"], g: item["性別(M/F)"] }));
            }
            // 解析成績
            if(workbook.Sheets["Records"]) {
                const json_rec = XLSX.utils.sheet_to_json(workbook.Sheets["Records"]);
                records = json_rec.map(item => ({ date: item["日期"], name: item["姓名"], year: item["年份"], gender: item["性別"], event: item["項目"], val: item["成績"], comp: item["比賽"], award: item["備註"] || "", id: Date.now() + Math.random() }));
            }
            // 解析排陣
            if(workbook.Sheets["Squads"]) {
                const json_sq = XLSX.utils.sheet_to_json(workbook.Sheets["Squads"]);
                squads = {};
                json_sq.forEach(item => { squads[item["位置Key"]] = item["名單"].split(', ').filter(n => n !== ""); });
            }
            saveAll();
            location.reload();
        }
    };
    reader.readAsArrayBuffer(file);
}

// --- 成績編輯邏輯 (V17) ---
function saveRecord() {
    const id = document.getElementById('editModeId').value;
    const val = parseFloat(document.getElementById('resVal').value);
    if(!document.getElementById('resName').value || isNaN(val)) return alert("請輸入完整數據");
    
    const data = {
        id: id ? parseFloat(id) : Date.now(),
        comp: document.getElementById('resCompName').value || "日常測試",
        date: document.getElementById('resDate').value,
        name: document.getElementById('resName').value,
        year: parseInt(document.getElementById('resYear').value),
        gender: document.getElementById('resGender').value,
        event: document.getElementById('resEvent').value,
        val: val,
        award: document.getElementById('resAward').value
    };

    if(id) {
        const idx = records.findIndex(r => r.id == id);
        records[idx] = data;
        cancelEdit();
    } else {
        records.unshift(data);
    }
    saveAll(); renderRecords(); alert("儲存成功");
}

function editRecord(id) {
    const r = records.find(rec => rec.id == id);
    document.getElementById('formTitle').innerText = "✏️ 編輯紀錄中";
    document.getElementById('editModeId').value = r.id;
    document.getElementById('resCompName').value = r.comp;
    document.getElementById('resDate').value = r.date;
    document.getElementById('resYear').value = r.year;
    document.getElementById('resGender').value = r.gender;
    updateResNames();
    document.getElementById('resName').value = r.name;
    document.getElementById('resEvent').value = r.event;
    document.getElementById('resVal').value = r.val;
    document.getElementById('resAward').value = r.award;
    document.getElementById('saveBtn').innerText = "✅ 更新紀錄";
    document.getElementById('saveBtn').className = "btn btn-orange";
    document.getElementById('cancelBtn').style.display = "inline-flex";
    document.getElementById('results').scrollIntoView();
}

function cancelEdit() {
    document.getElementById('formTitle').innerText = "📍 新增/編輯成績";
    document.getElementById('editModeId').value = "";
    document.getElementById('saveBtn').innerText = "💾 儲存數據";
    document.getElementById('saveBtn').className = "btn btn-blue";
    document.getElementById('cancelBtn').style.display = "none";
    document.getElementById('resVal').value = "";
}

// --- 其餘支撐函數 ---
function renderRecords() {
    document.getElementById('recordListArea').innerHTML = records.map(r => `<tr><td>${r.date}</td><td><strong>${r.name}</strong></td><td>${r.event}</td><td>${r.val}</td><td>${r.comp}</td><td><button class="btn btn-blue" onclick="editRecord(${r.id})">編輯</button> <button class="btn btn-red" onclick="deleteRecord(${r.id})">刪除</button></td></tr>`).join('');
}
function deleteRecord(id) { if(confirm("確定刪除？")) { records = records.filter(r => r.id != id); saveAll(); renderRecords(); } }
function updateResNames() {
    const yr = parseInt(document.getElementById('resYear').value), g = document.getElementById('resGender').value;
    const sel = document.getElementById('resName'); sel.innerHTML = "";
    students.filter(s => s.y == yr && s.g == g).forEach(s => sel.add(new Option(s.n, s.n)));
}
function addNewStudent() {
    const n = document.getElementById('newStuName').value, y = parseInt(document.getElementById('newStuYear').value), g = document.getElementById('newStuGender').value;
    if(!n || !y) return; students.push({n, y, g}); saveAll(); renderStudentAdmin(); updateResNames();
}
function renderStudentAdmin() {
    document.getElementById('stuListArea').innerHTML = students.map(s => `<tr><td>${s.n}</td><td>${s.y}</td><td>${s.g}</td><td><button class="btn btn-red" onclick="deleteStudent('${s.n}', ${s.y})">廢除</button></td></tr>`).join('');
}
function deleteStudent(n, y) { if(confirm("確定廢除？")) { students = students.filter(s => !(s.n == n && s.y == y)); saveAll(); renderStudentAdmin(); updateResNames(); } }
function saveAll() { localStorage.setItem('ckc_stu', JSON.stringify(students)); localStorage.setItem('ckc_rec', JSON.stringify(records)); localStorage.setItem('ckc_sq', JSON.stringify(squads)); }

// --- 分析與排行榜 (V16 邏輯) ---
function updateAnalysis() {
    const yr = parseInt(document.getElementById('chartYear').value), g = document.getElementById('chartGender').value, ev = document.getElementById('chartEvent').value;
    const isField = ["跳遠", "跳高", "擲壘球", "推鉛球"].includes(ev);
    const bests = {};
    records.filter(r => r.year == yr && r.gender == g && r.event == ev).forEach(r => {
        if(!bests[r.name] || (isField ? r.val > bests[r.name].val : r.val < bests[r.name].val)) bests[r.name] = r;
    });
    const top5 = Object.values(bests).sort((a,b) => isField ? b.val - a.val : a.val - b.val).slice(0,5);
    const area = document.getElementById('top5Area'); area.innerHTML = "";
    document.getElementById('top5Empty').style.display = top5.length ? "none" : "block";
    top5.forEach((r, idx) => { area.innerHTML += `<tr><td>第 ${idx+1} 名</td><td><strong>${r.name}</strong></td><td>${r.val}</td><td>${r.comp}</td><td>${r.date}</td></tr>`; });
    
    // 圖表更新
    const filtered = records.filter(r => r.year == yr && r.gender == g && r.event == ev).sort((a,b) => new Date(a.date) - new Date(b.date));
    const studentData = {}; filtered.forEach(r => { if(!studentData[r.name]) studentData[r.name] = []; studentData[r.name].push({ x: r.date, y: r.val }); });
    if(chartInstance) chartInstance.destroy();
    chartInstance = new Chart(document.getElementById('compareChart').getContext('2d'), { type: 'line', data: { datasets: Object.keys(studentData).map((n, i) => ({ label: n, data: studentData[n], borderColor: `hsl(${(i*70)%360},70%,50%)`, fill: false })) }, options: { responsive: true, maintainAspectRatio: false, scales: { y: { reverse: !isField } } } });
}

// --- 排陣功能 (精簡) ---
const QUOTAS = { plk: { A: {"60m":2,"100m":2,"200m":2,"400m":1,"跳遠":1,"跳高":1,"4x100m":6}, B: {"60m":2,"100m":2,"200m":2,"跳遠":1,"4x100m":6}, C: {"60m":2,"100m":2,"跳遠":1,"4x100m":6} } };
function renderSquadBoard() {
    const comp = document.getElementById('sqComp').value, gKey = document.getElementById('sqGrade').value, gender = gKey.startsWith('F') ? 'F' : 'M', grade = gKey.replace('F', '');
    const board = document.getElementById('squadBoard'); board.innerHTML = "";
    const qSet = QUOTAS.plk[grade] || {}; // 示例僅用 PLK quota
    Object.keys(qSet).forEach(ev => {
        const quota = qSet[ev], key = `${comp}_${gKey}_${ev}`, names = squads[key] || [];
        let pills = ""; for(let i=0; i<quota; i++) { const n = names[i] || "待選擇"; pills += `<div class="slot-pill ${n!=='待選擇'?'slot-filled':''}" onclick="openPicker('${key}', ${i}, '${gender}')">${n}</div>`; }
        board.innerHTML += `<div class="event-slot-card"><strong>${ev}</strong><div>${pills}</div></div>`;
    });
}
function openPicker(key, index, gender) {
    activeSlot = { key, index };
    const list = document.getElementById('pickerList'); list.innerHTML = `<button class="btn" style="width:100%; margin-bottom:10px; background:#fdd;" onclick="selectAthlete('')">❌ 清空</button>`;
    students.filter(s => s.g == gender).forEach(s => {
        const btn = document.createElement('button'); btn.className = "btn"; btn.style = "width:100%; margin-bottom:5px; text-align:left; background:#fff; border:1px solid #ddd;";
        btn.innerText = s.n; btn.onclick = () => selectAthlete(s.n); list.appendChild(btn);
    });
    document.getElementById('pickerModal').style.display = "flex";
}
function selectAthlete(n) { if(!squads[activeSlot.key]) squads[activeSlot.key] = []; if(n==="") squads[activeSlot.key].splice(activeSlot.index,1); else squads[activeSlot.key][activeSlot.index] = n; saveAll(); document.getElementById('pickerModal').style.display = "none"; renderSquadBoard(); }
function closePicker() { document.getElementById('pickerModal').style.display = "none"; }
function resetSystem() { if(confirm("確定清空所有數據？此操作不可逆！")) { localStorage.clear(); location.reload(); } }
</script>
</body>
</html>
